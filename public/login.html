<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alliance Hub - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        border: "hsl(240 3.7% 15.9%)",
                        input: "hsl(240 3.7% 15.9%)",
                        ring: "hsl(240 4.9% 83.9%)",
                        background: "hsl(240 10% 3.9%)",
                        foreground: "hsl(0 0% 98%)",
                        primary: { DEFAULT: "hsl(0 0% 98%)", foreground: "hsl(240 5.9% 10%)" },
                        secondary: { DEFAULT: "hsl(240 3.7% 15.9%)", foreground: "hsl(0 0% 98%)" },
                        muted: { DEFAULT: "hsl(240 3.7% 15.9%)", foreground: "hsl(240 5% 64.9%)" },
                        destructive: { DEFAULT: "hsl(0 62.8% 30.6%)", foreground: "hsl(0 0% 98%)" },
                        card: { DEFAULT: "hsl(240 10% 3.9%)", foreground: "hsl(0 0% 98%)" },
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: hsl(240 10% 3.9%); }
        /* Smooth fade in for the card */
        .fade-in { animation: fadeIn 0.5s ease-out forwards; opacity: 0; transform: translateY(10px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-foreground font-sans p-4 selection:bg-primary selection:text-primary-foreground">

    <div class="w-full max-w-sm fade-in">
        <div class="bg-card border border-border rounded-xl shadow-2xl p-8 flex flex-col gap-6 relative overflow-hidden">
            
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>

            <div class="flex flex-col space-y-2 text-center">
                <i class="fa-solid fa-shuttle-space text-3xl mb-2 text-primary"></i>
                <h1 class="text-2xl font-semibold tracking-tight">Alliance Intel Hub</h1>
                <p class="text-sm text-muted-foreground">Enter your credentials to access the grid.</p>
            </div>

            <form id="loginForm" class="flex flex-col gap-4">
                <div class="space-y-2">
                    <label for="game_name" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">In-Game Name</label>
                    <input type="text" id="game_name" placeholder="e.g. Harpyie" required
                        class="flex h-10 w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 transition-colors">
                </div>
                
                <div class="space-y-2">
                    <label for="password" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Your Tool Password</label>
                    <input type="password" id="password" placeholder="••••••••" required
                        class="flex h-10 w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 transition-colors">
                </div>

                <div id="error-msg" class="text-sm text-red-500 font-medium h-5 text-center transition-opacity opacity-0"></div>

                <button type="submit" id="btn-login" 
                    class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2 w-full mt-2">
                    Login
                </button>
            </form>

            <div class="relative">
                <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-border"></span></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-card px-2 text-muted-foreground">Admin Access</span></div>
            </div>

            <button type="button" onclick="handleAdminLogin()" 
                class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 border border-input bg-transparent hover:bg-accent hover:text-accent-foreground h-10 px-4 py-2 w-full">
                <i class="fa-solid fa-shield-halved mr-2"></i> Login as Admin
            </button>
        </div>
    </div>

    <script>
        const errorDiv = document.getElementById('error-msg');
        const loginBtn = document.getElementById('btn-login');

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.classList.remove('opacity-0');
        }

        function clearError() {
            errorDiv.textContent = '';
            errorDiv.classList.add('opacity-0');
        }

        async function executeLogin(game_name, password) {
            clearError();
            const originalBtnText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
            loginBtn.disabled = true;

            try {
                const response = await fetch('/hub-api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ game_name, password })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    showError(data.error || 'Login failed.');
                    loginBtn.innerHTML = originalBtnText;
                    loginBtn.disabled = false;
                }
            } catch (err) {
                showError('Server connection lost.');
                loginBtn.innerHTML = originalBtnText;
                loginBtn.disabled = false;
            }
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const game_name = document.getElementById('game_name').value.trim();
            const password = document.getElementById('password').value;

            // Block manual admin login through the standard form
            if (game_name.toLowerCase() === 'admin') {
                showError('Use the "Login as Admin" button below.');
                return;
            }

            executeLogin(game_name, password);
        });

        function handleAdminLogin() {
            const password = prompt("Enter Master Admin Password:");
            if (password) {
                executeLogin('admin', password);
            }
        }
    </script>
</body>
</html>
