<div id="travel-calc-panel" class="fixed top-0 right-0 h-full w-full md:w-[calc(100%-3.5rem)] bg-black border-l border-border transform translate-x-full transition-transform duration-300 z-40 flex flex-col shadow-2xl overflow-hidden">

    <div class="h-14 border-b border-border flex items-center justify-between px-6 bg-zinc-900 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-md bg-white/5 flex items-center justify-center">
                <i class="fa-solid fa-route text-base text-sky-400"></i>
            </div>
            <div>
                <h2 class="font-bold text-foreground tracking-wide">Travel Calculator</h2>
                <p class="text-sm text-muted-foreground">Exact fleet travel time between coordinates</p>
            </div>
        </div>
        <button id="close-travel-calc-btn" class="w-8 h-8 rounded-md hover:bg-accent flex items-center justify-center text-muted-foreground hover:text-foreground transition-colors">
            <i class="fa-solid fa-xmark text-base"></i>
        </button>
    </div>

    <div class="flex-1 overflow-auto bg-black p-4 md:p-6">
        <div class="max-w-3xl mx-auto flex flex-col gap-6">

            <!-- Origin / Destination -->
            <div class="grid grid-cols-2 gap-4">
                <!-- ORIGIN -->
                <div class="bg-zinc-900 border border-border rounded-lg p-4 flex flex-col gap-3">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2 text-sky-400 font-semibold text-sm uppercase tracking-wider">
                            <i class="fa-solid fa-location-dot"></i> Origin
                        </div>
                        <div class="relative">
                            <input type="text" id="tc-orig-sys-input" placeholder="Find system…" autocomplete="off"
                                class="h-7 w-36 rounded border border-input bg-zinc-950 px-2 text-xs text-foreground focus:outline-none focus:border-zinc-500">
                            <div id="tc-orig-sys-dropdown" class="hidden absolute top-8 right-0 z-50 w-48 bg-zinc-900 border border-border rounded shadow-xl max-h-48 overflow-y-auto"></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="flex flex-col gap-1"><label class="text-xs text-muted-foreground">X</label>
                            <input type="number" id="tc-orig-x" value="0" class="tc-in h-9 w-full rounded border border-input bg-zinc-950 px-2 text-sm text-foreground focus:outline-none focus:border-zinc-500"></div>
                        <div class="flex flex-col gap-1"><label class="text-xs text-muted-foreground">Y</label>
                            <input type="number" id="tc-orig-y" value="0" class="tc-in h-9 w-full rounded border border-input bg-zinc-950 px-2 text-sm text-foreground focus:outline-none focus:border-zinc-500"></div>
                        <div class="flex flex-col gap-1"><label class="text-xs text-muted-foreground">Planet</label>
                            <input type="number" id="tc-orig-p" min="1" max="12" value="1" class="tc-in h-9 w-full rounded border border-input bg-zinc-950 px-2 text-sm text-foreground focus:outline-none focus:border-zinc-500"></div>
                    </div>
                </div>

                <!-- DESTINATION -->
                <div class="bg-zinc-900 border border-border rounded-lg p-4 flex flex-col gap-3">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2 text-red-400 font-semibold text-sm uppercase tracking-wider">
                            <i class="fa-solid fa-flag-checkered"></i> Destination
                        </div>
                        <div class="relative">
                            <input type="text" id="tc-dest-sys-input" placeholder="Find system…" autocomplete="off"
                                class="h-7 w-36 rounded border border-input bg-zinc-950 px-2 text-xs text-foreground focus:outline-none focus:border-zinc-500">
                            <div id="tc-dest-sys-dropdown" class="hidden absolute top-8 right-0 z-50 w-48 bg-zinc-900 border border-border rounded shadow-xl max-h-48 overflow-y-auto"></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="flex flex-col gap-1"><label class="text-xs text-muted-foreground">X</label>
                            <input type="number" id="tc-dest-x" value="0" class="tc-in h-9 w-full rounded border border-input bg-zinc-950 px-2 text-sm text-foreground focus:outline-none focus:border-zinc-500"></div>
                        <div class="flex flex-col gap-1"><label class="text-xs text-muted-foreground">Y</label>
                            <input type="number" id="tc-dest-y" value="1" class="tc-in h-9 w-full rounded border border-input bg-zinc-950 px-2 text-sm text-foreground focus:outline-none focus:border-zinc-500"></div>
                        <div class="flex flex-col gap-1"><label class="text-xs text-muted-foreground">Planet</label>
                            <input type="number" id="tc-dest-p" min="1" max="12" value="1" class="tc-in h-9 w-full rounded border border-input bg-zinc-950 px-2 text-sm text-foreground focus:outline-none focus:border-zinc-500"></div>
                    </div>
                </div>
            </div>

            <!-- Fleet params -->
            <div class="bg-zinc-900 border border-border rounded-lg p-4 flex flex-col gap-3">
                <div class="flex items-center justify-between">
                    <div class="text-amber-400 font-semibold text-sm uppercase tracking-wider"><i class="fa-solid fa-gauge-high"></i> Fleet</div>
                    <div class="relative">
                        <input type="text" id="tc-player-input" placeholder="Fill Energy/Speed from player…" autocomplete="off"
                            class="h-7 w-56 rounded border border-input bg-zinc-950 px-2 text-xs text-foreground focus:outline-none focus:border-zinc-500">
                        <div id="tc-player-dropdown" class="hidden absolute top-8 right-0 z-50 w-56 bg-zinc-900 border border-border rounded shadow-xl max-h-48 overflow-y-auto"></div>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-3 items-end">
                    <div class="flex flex-col gap-1"><label class="text-xs text-muted-foreground">Energy</label>
                        <input type="number" id="tc-energy" min="0" max="100" value="0" class="tc-in h-9 w-full rounded border border-input bg-zinc-950 px-2 text-sm text-foreground focus:outline-none focus:border-zinc-500"></div>
                    <div class="flex flex-col gap-1"><label class="text-xs text-muted-foreground">Race Speed</label>
                        <input type="number" id="tc-speed" min="-4" max="4" value="0" class="tc-in h-9 w-full rounded border border-input bg-zinc-950 px-2 text-sm text-foreground focus:outline-none focus:border-zinc-500"></div>
                    <label class="flex items-center gap-2 h-9 text-sm text-muted-foreground cursor-pointer">
                        <input type="checkbox" id="tc-alliance" class="tc-in w-4 h-4 rounded border-border bg-transparent cursor-pointer">
                        Allied / own destination (½)
                    </label>
                </div>
            </div>

            <!-- Result -->
            <div id="tc-result" class="bg-zinc-900 border border-border rounded-lg p-6 flex flex-col items-center gap-2">
                <div class="text-xs font-semibold text-muted-foreground uppercase tracking-wider">Travel time</div>
                <div id="tc-time" class="text-4xl font-bold font-mono text-foreground">--:--:--</div>
                <div id="tc-meta" class="text-xs text-muted-foreground"></div>
            </div>

        </div>
    </div>
</div>
