<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alliance Hub - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { aw: { bg: '#0d1117', panel: '#161b22', border: '#30363d', primary: '#2f81f7', enemy: '#f85149', ally: '#3fb950', warning: '#d29922', discord: '#5865F2' } } } }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b949e; }
        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-active { transform: translateY(0); opacity: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-text { transition: opacity 0.2s ease-in-out; opacity: 0; white-space: nowrap; pointer-events: none; }
        @media (min-width: 768px) {
            #sidebar.expanded { width: 22rem; }
            #sidebar.expanded .sidebar-text { opacity: 1; pointer-events: auto; }
            #sidebar:not(.expanded) .hide-collapsed { display: none; }
        }
        @media (max-width: 767px) {
            #sidebar { transform: translateX(-100%); width: 100%; border-right: none; }
            #sidebar.expanded { transform: translateX(0); }
            #sidebar.expanded .sidebar-text { opacity: 1; pointer-events: auto; }
            #mobile-trigger { display: flex; }
        }
        .plan-card { border-left: 3px solid #d29922; }
    </style>
</head>
<body class="w-screen h-screen overflow-hidden bg-black text-gray-300 font-sans text-sm select-none" oncontextmenu="return false;">

    <main class="absolute inset-0 w-full h-full bg-[#0a0a0a] z-0">
        <iframe id="game-frame" class="w-full h-full border-none"></iframe>
    </main>

    <button id="mobile-trigger" onclick="toggleSidebar()" class="hidden absolute top-4 left-4 z-40 bg-aw-panel border border-aw-border text-aw-primary w-12 h-12 rounded-lg shadow-lg items-center justify-center">
        <i class="fa-solid fa-bars text-xl"></i>
    </button>

    <nav id="sidebar" class="absolute top-0 left-0 h-full w-14 md:w-14 transition-all duration-300 bg-aw-panel/95 backdrop-blur-sm border-r border-aw-border flex flex-col z-50 overflow-x-hidden shadow-[5px_0_15px_rgba(0,0,0,0.5)]">
        
        <button onclick="toggleSidebar()" class="h-14 w-full flex items-center justify-start px-4 border-b border-aw-border hover:bg-aw-border text-aw-primary shrink-0 transition-colors group">
            <i class="fa-solid fa-satellite-dish text-xl w-6 text-center group-hover:scale-110 transition-transform"></i>
            <span class="ml-4 font-bold tracking-wide sidebar-text">Intel Hub v2</span>
            <i class="fa-solid fa-xmark ml-auto md:hidden text-gray-500 sidebar-text text-xl"></i>
        </button>

        <div class="flex-1 overflow-y-auto overflow-x-hidden flex flex-col">
            
            <!-- 1. CONTEXTUAL TOOLS -->
            <div id="context-tools" class="flex flex-col py-2 border-b border-aw-border hidden">
                <div class="px-4 py-2 text-[10px] text-gray-500 uppercase tracking-widest hide-collapsed font-bold flex justify-between">
                    <span>Active Intel</span>
                    <span id="ui-sys-id" class="text-aw-primary font-mono hidden">--</span>
                </div>
                
                <button onclick="toggleSystemIntelView()" class="mx-4 mb-2 bg-aw-panel border border-aw-border hover:bg-aw-border text-white font-bold py-1 px-2 rounded transition-colors text-xs flex justify-center items-center gap-2 hide-collapsed">
                    <i class="fa-solid fa-table-list"></i> Full System Intel
                </button>

                <div id="system-intel-container" class="px-4 py-2 hide-collapsed hidden flex-col gap-4 text-xs overflow-y-auto max-h-[50vh]">
                    <div>
                        <div class="text-aw-warning font-bold border-b border-aw-border mb-1">Planets</div>
                        <div id="intel-planets-list" class="flex flex-col gap-1"></div>
                    </div>
                    <div>
                        <div class="text-aw-enemy font-bold border-b border-aw-border mb-1">Fleets in Orbit</div>
                        <div id="intel-fleets-list" class="flex flex-col gap-1"></div>
                    </div>
                    <div>
                        <div class="text-aw-discord font-bold border-b border-aw-border mb-1">Recent History</div>
                        <div id="intel-history-list" class="flex flex-col gap-1"></div>
                    </div>
                </div>

                <div id="system-plans-container" class="px-4 py-2 hide-collapsed hidden flex-col gap-3">
                    <div class="bg-aw-bg border border-aw-border rounded p-2">
                        <div class="flex gap-2 mb-2">
                            <input type="number" id="plan-planet-idx" placeholder="Planet #" min="1" max="20" class="w-20 bg-aw-panel border border-aw-border rounded px-2 py-1 text-white text-xs focus:outline-none focus:border-aw-primary">
                            <input type="text" id="plan-note" placeholder="Target instructions..." class="flex-1 bg-aw-panel border border-aw-border rounded px-2 py-1 text-white text-xs focus:outline-none focus:border-aw-primary">
                        </div>
                        <button onclick="savePlan()" class="w-full bg-aw-primary hover:bg-blue-600 text-white font-bold py-1 px-2 rounded transition-colors text-xs">
                            <i class="fa-solid fa-plus"></i> Save Plan
                        </button>
                    </div>
                    <div id="plans-list" class="flex flex-col gap-2 empty:hidden"></div>
                </div>

                <button id="btn-ctx-map" onclick="copyToDiscord('map')" class="h-12 w-full flex items-center justify-start px-4 hover:bg-aw-border text-gray-300 hidden transition-colors mt-2">
                    <i class="fa-solid fa-map text-aw-warning text-lg w-6 text-center"></i>
                    <div class="ml-4 flex flex-col items-start sidebar-text">
                        <span class="text-[10px] text-gray-500 uppercase leading-tight">Coordinates</span>
                        <span id="ui-map-coords" class="font-mono font-bold text-white leading-tight">X: -- / Y: --</span>
                    </div>
                </button>
            </div>

            <!-- <!-- 2. DATABASE SEARCH -->
            <div class="flex flex-col py-2 border-b border-aw-border hide-collapsed">
                <div class="px-4 py-2 text-[10px] text-gray-500 uppercase tracking-widest font-bold">Database Search</div>
                
                <!-- Player Search -->
                <div class="px-4 mb-3">
                    <div class="relative">
                        <input type="text" id="search-player-input" placeholder="Player Name or ID..." class="w-full bg-aw-bg border border-aw-border rounded px-3 py-1.5 text-white text-xs focus:outline-none focus:border-aw-primary pe-8" onkeypress="if(event.key === 'Enter') executeSearch('player')">
                        <button onclick="executeSearch('player')" class="absolute right-2 top-1.5 text-gray-500 hover:text-aw-primary transition-colors"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                    <div id="search-player-results" class="mt-1 flex flex-col gap-1 max-h-40 overflow-y-auto empty:hidden custom-scrollbar"></div>
                </div>

                <!-- System Search -->
                <div class="px-4 mb-1">
                    <div class="relative">
                        <input type="text" id="search-system-input" placeholder="System Name or ID..." class="w-full bg-aw-bg border border-aw-border rounded px-3 py-1.5 text-white text-xs focus:outline-none focus:border-aw-warning pe-8" onkeypress="if(event.key === 'Enter') executeSearch('system')">
                        <button onclick="executeSearch('system')" class="absolute right-2 top-1.5 text-gray-500 hover:text-aw-warning transition-colors"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                    <div id="search-system-results" class="mt-1 flex flex-col gap-1 max-h-40 overflow-y-auto empty:hidden custom-scrollbar"></div>
                </div>
            </div>

            <!-- MASS SCANNER -->
            <div class="flex flex-col py-2 border-b border-aw-border hide-collapsed">
                <div class="px-4 py-2 text-[10px] text-gray-500 uppercase tracking-widest font-bold">Automation</div>
                <div class="px-4 mb-2 flex flex-col gap-2">
                    <button id="btn-mass-scan" class="w-full bg-aw-primary hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition-colors text-xs flex items-center justify-center gap-2">
                        <i class="fa-solid fa-radar text-sm"></i> Scan Galaxy
                    </button>
                    <button id="btn-mass-scan-players" class="w-full bg-aw-primary hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition-colors text-xs flex items-center justify-center gap-2">
                        <i class="fa-solid fa-user-astronaut text-sm"></i> Scan Players
                    </button>
                </div>
                <div id="scan-progress-container" class="px-4 hidden flex-col gap-1">
                    <div class="flex justify-between text-[10px] text-gray-400 font-mono">
                        <span id="scan-status-text">Initializing...</span>
                        <span id="scan-count-text">0/0</span>
                    </div>
                    <div class="w-full bg-aw-bg rounded-full h-1.5 border border-aw-border overflow-hidden">
                        <div id="scan-progress-bar" class="bg-aw-ally h-1.5 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- DB Summary -->
            <div class="p-4 hide-collapsed mt-auto">
                <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-2 font-bold flex justify-between items-center">
                    <span>Storage Stats</span>
                    <button onclick="refreshDbStats()" class="hover:text-white" title="Refresh Stats"><i class="fa-solid fa-rotate"></i></button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="bg-aw-bg/50 border border-aw-border rounded p-2 flex flex-col items-center">
                        <span class="text-gray-500 text-[10px]">Planets</span>
                        <span id="stat-planets" class="text-sm font-bold text-white">0</span>
                    </div>
                    <div class="bg-aw-bg/50 border border-aw-border rounded p-2 flex flex-col items-center">
                        <span class="text-gray-500 text-[10px]">Players</span>
                        <span id="stat-players" class="text-sm font-bold text-white">0</span>
                    </div>
                    <div class="bg-aw-bg/50 border border-aw-border rounded p-2 flex flex-col items-center">
                        <span class="text-gray-500 text-[10px]">Fleets</span>
                        <span id="stat-fleets" class="text-sm font-bold text-white">0</span>
                    </div>
                    <div class="bg-aw-bg/50 border border-aw-border rounded p-2 flex flex-col items-center">
                        <span class="text-gray-500 text-[10px]">Alliances</span>
                        <span id="stat-alliances" class="text-sm font-bold text-white">0</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="border-t border-aw-border flex flex-col py-2 shrink-0 bg-aw-panel">
            <button id="admin-panel-btn" onclick="window.open('/admin', '_blank')" class="hidden h-12 w-full items-center justify-start px-4 hover:bg-aw-warning/20 text-aw-warning transition-colors">
                <i class="fa-solid fa-gear w-6 text-center text-lg"></i>
                <span class="ml-4 sidebar-text">Admin Panel</span>
            </button>
            <button onclick="logout()" class="h-12 w-full flex items-center justify-start px-4 hover:bg-red-900/50 text-red-400 transition-colors">
                <i class="fa-solid fa-right-from-bracket w-6 text-center text-lg"></i>
                <div class="ml-4 flex flex-col items-start sidebar-text">
                    <span class="leading-tight">Logout</span>
                    <span id="auth-user-display" class="text-[10px] text-gray-500 font-mono">Auth: --</span>
                </div>
            </button>
        </div>
    </nav>

    <div id="toast" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-aw-discord text-white text-xs font-bold py-2 px-4 rounded shadow-lg flex items-center justify-center gap-2 pointer-events-none toast-enter z-50">
        <i class="fa-solid fa-circle-check"></i> <span id="toast-msg">Copied</span>
    </div>

    <!-- MAIN LOGIC -->
    <script>
        let toolUser = null;
        let currentSystemId = null; 

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const savedPath = urlParams.get('p') || '/';
            document.getElementById('game-frame').src = savedPath;

            const sidebar = document.getElementById('sidebar');
            const mobileBtn = document.getElementById('mobile-trigger');
            
            if (localStorage.getItem('sidebarOpen') === 'true') {
                sidebar.classList.add('expanded');
                mobileBtn.classList.add('hidden');
                refreshDbStats(); 
            } else {
                if (window.innerWidth < 768) mobileBtn.classList.remove('hidden');
            }
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mobileBtn = document.getElementById('mobile-trigger');
            
            sidebar.classList.toggle('expanded');
            const isOpen = sidebar.classList.contains('expanded');
            localStorage.setItem('sidebarOpen', isOpen);

            if (window.innerWidth < 768) {
                if (isOpen) mobileBtn.classList.add('hidden');
                else mobileBtn.classList.remove('hidden');
            }
            if (isOpen) refreshDbStats();
        }

        function toggleSystemIntelView() {
            const container = document.getElementById('system-intel-container');
            container.classList.toggle('hidden');
            container.classList.toggle('flex');
        }

        async function initWrapper() {
            const res = await fetch('/hub-api/me');
            if (res.ok) {
                toolUser = await res.json();
                document.getElementById('auth-user-display').innerText = `Auth: ${toolUser.gameName}`;
                if (toolUser.role === 'admin') document.getElementById('admin-panel-btn').style.display = 'flex';
            }
        }
        initWrapper();

        async function refreshDbStats() {
            try {
                const res = await fetch('/hub-api/intel/summary');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('stat-planets').innerText = data.planets;
                    document.getElementById('stat-players').innerText = data.players;
                    document.getElementById('stat-fleets').innerText = data.fleets || 0;
                    document.getElementById('stat-alliances').innerText = data.alliances;
                }
            } catch (err) {}
        }

        async function loadPlans(sysId) {
            if (!sysId) return;
            try {
                const res = await fetch(`/hub-api/intel/system/${sysId}`);
                const data = await res.json();
                if (!data.success) return;

                const list = document.getElementById('plans-list');
                list.innerHTML = '';
                if (data.plans.length > 0) {
                    data.plans.forEach(p => {
                        list.innerHTML += `
                            <div class="bg-aw-bg border border-aw-border p-2 rounded plan-card relative group">
                                <div class="flex justify-between items-start mb-1">
                                    <span class="text-aw-warning font-bold text-xs">Planet #${p.planet_index}</span>
                                    <button onclick="deletePlan(${p.planet_index})" class="text-gray-600 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-solid fa-trash text-xs"></i></button>
                                </div>
                                <p class="text-gray-300 text-xs mb-1">${p.note}</p>
                                <div class="text-[9px] text-gray-500 text-right">by ${p.author || 'Unknown'}</div>
                            </div>
                        `;
                    });
                }

                const pList = document.getElementById('intel-planets-list');
                const fList = document.getElementById('intel-fleets-list');
                const hList = document.getElementById('intel-history-list');
                
                pList.innerHTML = data.planets.map(p => `<div class="flex justify-between"><span class="text-gray-400">#${p.planet_index}</span><span>${p.owner_name ? `[${p.alliance_tag || '?'}] ${p.owner_name}` : 'Empty'}</span></div>`).join('');
                fList.innerHTML = data.fleets.length ? data.fleets.map(f => `<div class="flex justify-between text-[10px]"><span class="text-gray-400">At #${f.planet_index}</span><span class="text-aw-enemy">by [${f.alliance_tag || '?'}] ${f.owner_name || 'Unknown'}</span></div>`).join('') : '<span class="text-gray-600 italic">No fleets detected.</span>';
                hList.innerHTML = data.history.length ? data.history.map(h => `<div class="text-[10px] leading-tight mb-1"><span class="text-gray-500">${new Date(h.timestamp).toLocaleTimeString()} (#${h.planet_index})</span><br>${h.event_type_id === 1 ? `<span class="text-aw-warning">${h.old_owner || 'None'} &rarr; ${h.new_owner || 'None'}</span>` : `<span class="text-aw-enemy">Population Drop</span>`}</div>`).join('') : '<span class="text-gray-600 italic">No recent history.</span>';

                const iframe = document.getElementById('game-frame');
                if (iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: 'INJECT_TACTICAL_OVERLAYS', payload: { plans: data.plans, fleets: data.fleets, planets: data.planets } }, window.location.origin);
                }

            } catch (err) { console.error("Failed to load intel package", err); }
        }

        async function savePlan() {
            const pIdx = document.getElementById('plan-planet-idx').value;
            const note = document.getElementById('plan-note').value;
            if (!currentSystemId || !pIdx || !note) return showToast('Fill all fields');

            try {
                const res = await fetch('/hub-api/plans', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ system_id: currentSystemId, planet_index: pIdx, note }) });
                if (res.ok) {
                    document.getElementById('plan-planet-idx').value = '';
                    document.getElementById('plan-note').value = '';
                    loadPlans(currentSystemId);
                    showToast('Plan Saved');
                }
            } catch (err) {}
        }

        async function deletePlan(pIdx) {
            if (!currentSystemId || !confirm("Delete this plan?")) return;
            try {
                const res = await fetch(`/hub-api/plans/${currentSystemId}/${pIdx}`, { method: 'DELETE' });
                if (res.ok) {
                    loadPlans(currentSystemId);
                    showToast('Plan Deleted');
                }
            } catch (err) {}
        }

        window.addEventListener('message', async (event) => {
            if (event.origin !== window.location.origin) return;
            const data = event.data;

            if (data.type === 'GAME_CONTEXT') {
                const p = data.payload;

                if (p.path) {
                    const currentUrl = new URL(window.location);
                    if (currentUrl.searchParams.get('p') !== p.path) {
                        window.history.replaceState(null, '', `/dashboard?p=${p.path}`);
                    }
                }

                if (p.playerName && toolUser && toolUser.gameName) {
                    if (toolUser.role !== 'admin' && p.playerName.toLowerCase() !== toolUser.gameName.toLowerCase()) {
                        const response = await fetch('/hub-api/nuke', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ detectedName: p.playerName }) });
                        const nukeData = await response.json();
                        if (nukeData.banned) {
                            document.body.innerHTML = `<div style="color:red; font-size:24px; padding:50px; text-align:center;"><h1>SECURITY BREACH DETECTED</h1><p>Banned for credential sharing.</p></div>`;
                            setTimeout(() => window.location.href = '/hub-assets/login.html', 3000);
                            return;
                        }
                    }
                }

                const ctxContainer = document.getElementById('context-tools');
                const planContainer = document.getElementById('system-plans-container');
                const btnMap = document.getElementById('btn-ctx-map');
                const sysLabel = document.getElementById('ui-sys-id');
                
                ctxContainer.classList.add('hidden');
                planContainer.classList.add('hidden');
                btnMap.classList.add('hidden');
                sysLabel.classList.add('hidden');

                if (p.isSystemView && p.systemId) {
                    currentSystemId = p.systemId;
                    ctxContainer.classList.remove('hidden');
                    planContainer.classList.remove('hidden');
                    sysLabel.classList.remove('hidden');
                    sysLabel.innerText = `Sys #${p.systemId}`;
                    loadPlans(p.systemId);
                } 
                
                if (p.isMap && p.mapX && p.mapY) {
                    ctxContainer.classList.remove('hidden');
                    btnMap.classList.remove('hidden');
                    document.getElementById('ui-map-coords').innerText = `${p.mapX} / ${p.mapY}`;
                }
            }
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.classList.add('toast-active');
            toast.classList.remove('toast-enter');
            setTimeout(() => {
                toast.classList.remove('toast-active');
                toast.classList.add('toast-enter');
            }, 2500);
        }

        function copyToDiscord(type) {
            if (type === 'map') {
                const coords = document.getElementById('ui-map-coords').innerText;
                navigator.clipboard.writeText(`Target Coordinates: ${coords}`);
                showToast('Coordinates Copied');
            }
        }

        async function logout() {
            await fetch('/hub-api/logout', { method: 'POST' });
            window.location.href = '/hub-assets/login.html';
        }

        // ==========================================
        // DATABASE SEARCH LOGIC
        // ==========================================
        async function executeSearch(type) {
            const input = document.getElementById(`search-${type}-input`);
            const resultsContainer = document.getElementById(`search-${type}-results`);
            const q = input.value.trim();
            
            if (!q) {
                resultsContainer.innerHTML = '';
                return;
            }

            resultsContainer.innerHTML = '<div class="text-xs text-gray-500 text-center py-2"><i class="fa-solid fa-circle-notch fa-spin"></i> Searching...</div>';

            try {
                const res = await fetch(`/hub-api/search/${type}?q=${encodeURIComponent(q)}`);
                const data = await res.json();

                if (!data.success || data.results.length === 0) {
                    resultsContainer.innerHTML = '<div class="text-xs text-gray-500 text-center py-2">No records found.</div>';
                    return;
                }

                if (type === 'player') {
                    resultsContainer.innerHTML = data.results.map(p => `
                        <button onclick="navToIframe('/Game/Players/Profile/${p.id}')" class="text-left w-full bg-aw-panel border border-aw-border hover:border-aw-primary rounded p-1.5 text-xs transition-colors flex justify-between items-center group">
                            <span class="text-gray-300 group-hover:text-white truncate">${p.alliance_tag ? `<span class="text-aw-warning">[${p.alliance_tag}]</span> ` : ''}${p.name}</span>
                            <span class="text-[10px] text-gray-600 font-mono">#${p.id}</span>
                        </button>
                    `).join('');
                } else if (type === 'system') {
                    resultsContainer.innerHTML = data.results.map(s => `
                        <button onclick="navToIframe('/Game/Map/SolarSystem/${s.id}')" class="text-left w-full bg-aw-panel border border-aw-border hover:border-aw-warning rounded p-1.5 text-xs transition-colors flex justify-between items-center group">
                            <span class="text-gray-300 group-hover:text-white truncate">${s.name}</span>
                            <span class="text-[10px] text-gray-600 font-mono">#${s.id} (${s.x}/${s.y})</span>
                        </button>
                    `).join('');
                }
            } catch (err) {
                resultsContainer.innerHTML = '<div class="text-xs text-red-500 text-center py-2">Search failed.</div>';
            }
        }

        // Helper to force the iframe to navigate and clean up UI
        function navToIframe(path) {
            document.getElementById('game-frame').src = path;
            
            // Clear search results so the UI stays tidy after clicking
            document.getElementById('search-player-results').innerHTML = '';
            document.getElementById('search-system-results').innerHTML = '';
            document.getElementById('search-player-input').value = '';
            document.getElementById('search-system-input').value = '';

            // If on mobile, auto-collapse the sidebar so they can see the game
            if (window.innerWidth < 768) {
                toggleSidebar();
            }
        }
    </script>

    <!-- Module Script for Automation -->
    <script type="module">
        import { runMassScan, runPlayerScan } from '/hub-assets/js/scrapers/mass-scanner.js';

        const container = document.getElementById('scan-progress-container');
        const textStatus = document.getElementById('scan-status-text');
        const textCount = document.getElementById('scan-count-text');
        const bar = document.getElementById('scan-progress-bar');
        
        const updateUI = (statusMsg, current, total) => {
            textStatus.innerText = statusMsg;
            textCount.innerText = total > 0 ? `${current}/${total}` : '';
            let percent = 0;
            if (total > 0) percent = Math.round((current / total) * 100);
            if (percent > 100) percent = 100;
            bar.style.width = `${percent}%`;
        };

        const lockUI = (btn1, btn2) => {
            [btn1, btn2].forEach(b => {
                b.disabled = true;
                b.classList.add('opacity-50', 'cursor-not-allowed');
            });
            container.classList.remove('hidden');
            container.classList.add('flex');
        };

        const unlockUI = (btn1, btn2) => {
            [btn1, btn2].forEach(b => {
                b.disabled = false;
                b.classList.remove('opacity-50', 'cursor-not-allowed');
            });
            setTimeout(() => refreshDbStats(), 500); 
        };

        document.getElementById('btn-mass-scan').addEventListener('click', async () => {
            const btn1 = document.getElementById('btn-mass-scan');
            const btn2 = document.getElementById('btn-mass-scan-players');
            lockUI(btn1, btn2);
            await runMassScan(updateUI);
            unlockUI(btn1, btn2);
        });

        document.getElementById('btn-mass-scan-players').addEventListener('click', async () => {
            const btn1 = document.getElementById('btn-mass-scan');
            const btn2 = document.getElementById('btn-mass-scan-players');
            lockUI(btn1, btn2);
            await runPlayerScan(updateUI);
            unlockUI(btn1, btn2);
        });
    </script>
</body>
</html>
