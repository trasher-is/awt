<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alliance Hub - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        border: "hsl(240 3.7% 15.9%)", input: "hsl(240 3.7% 15.9%)", ring: "hsl(240 4.9% 83.9%)", background: "hsl(240 10% 3.9%)", foreground: "hsl(0 0% 98%)",
                        primary: { DEFAULT: "hsl(0 0% 98%)", foreground: "hsl(240 5.9% 10%)" },
                        secondary: { DEFAULT: "hsl(240 3.7% 15.9%)", foreground: "hsl(0 0% 98%)" },
                        muted: { DEFAULT: "hsl(240 3.7% 15.9%)", foreground: "hsl(240 5% 64.9%)" },
                        accent: { DEFAULT: "hsl(240 3.7% 15.9%)", foreground: "hsl(0 0% 98%)" },
                        card: { DEFAULT: "hsl(240 10% 3.9%)", foreground: "hsl(0 0% 98%)" },
                        aw: { enemy: '#ef4444', ally: '#22c55e', warning: '#f59e0b', discord: '#5865F2' }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: hsl(240 3.7% 20%); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: hsl(240 5% 64.9%); }
        .toast-enter { transform: translateY(100%); opacity: 0; } .toast-active { transform: translateY(0); opacity: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-text { transition: opacity 0.2s ease-in-out; opacity: 0; white-space: nowrap; pointer-events: none; }
        @media (min-width: 768px) { #sidebar.expanded { width: 22rem; } #sidebar.expanded .sidebar-text { opacity: 1; pointer-events: auto; } #sidebar:not(.expanded) .hide-collapsed { display: none; } }
        @media (max-width: 767px) { #sidebar { transform: translateX(-100%); width: 100%; border-right: none; } #sidebar.expanded { transform: translateX(0); } #sidebar.expanded .sidebar-text { opacity: 1; pointer-events: auto; } #mobile-trigger { display: flex; } }
        .plan-card { border-left: 3px solid hsl(var(--aw-warning)); }
    </style>
</head>
<body class="w-screen h-screen overflow-hidden bg-background text-foreground font-sans text-sm select-none" oncontextmenu="return false;">

    <main class="absolute inset-0 w-full h-full bg-black z-0">
        <iframe id="game-frame" class="w-full h-full border-none"></iframe>
    </main>

    <button id="mobile-trigger" onclick="toggleSidebar()" class="hidden absolute top-4 left-4 z-40 bg-background border border-border text-foreground w-10 h-10 rounded-md shadow-sm items-center justify-center hover:bg-accent">
        <i class="fa-solid fa-bars"></i>
    </button>

    <nav id="sidebar" class="absolute top-0 left-0 h-full w-14 md:w-14 transition-all duration-300 bg-background/95 backdrop-blur-md border-r border-border flex flex-col z-50 overflow-x-hidden shadow-2xl">
        <button onclick="toggleSidebar()" class="h-14 w-full flex items-center justify-start px-4 border-b border-border hover:bg-accent text-foreground shrink-0 transition-colors group">
            <i class="fa-solid fa-shuttle-space text-lg w-6 text-center group-hover:scale-110 transition-transform"></i>
            <span class="ml-4 font-semibold tracking-wide sidebar-text">Hub v2</span>
            <i class="fa-solid fa-xmark ml-auto md:hidden text-muted-foreground sidebar-text text-lg"></i>
        </button>

        <div class="flex-1 flex flex-col pt-2">
            
            <div id="context-tools" class="flex flex-col pb-4 border-b border-border hidden">
                <div class="px-4 py-2 text-xs text-muted-foreground font-semibold uppercase tracking-wider hide-collapsed flex justify-between items-center">
                    <span>System Intel</span><span id="ui-sys-id" class="text-foreground font-mono hidden">--</span>
                </div>
                
                <div id="system-intel-container" class="px-4 py-2 hide-collapsed flex flex-col gap-4 text-sm">
                    <div>
                        <div class="text-muted-foreground font-semibold border-b border-border pb-1 mb-2">Planets</div>
                        <div id="intel-planets-list" class="flex flex-col gap-1.5"></div>
                    </div>
                    
                    <div id="system-plans-container" class="flex flex-col gap-3">
                        <div class="text-muted-foreground font-semibold border-b border-border pb-1 mb-2">Tactical Plans</div>
                        <div class="bg-card border border-border rounded-lg p-3 shadow-sm">
                            <div class="flex gap-2 mb-3">
                                <select id="plan-planet-idx" class="h-8 w-24 rounded-md border border-input bg-background px-2 py-1 text-sm shadow-sm focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring text-muted-foreground">
                                    <option value="" disabled selected>Planet #</option>
                                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                                    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                                    <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                                    <option value="10">10</option><option value="11">11</option><option value="12">12</option>
                                </select>
                                <input type="text" id="plan-note" placeholder="Instructions..." class="h-8 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring">
                                <button onclick="savePlan()" class="inline-flex items-center justify-center h-8 px-3 rounded-md bg-primary text-primary-foreground font-medium hover:bg-primary/90 text-sm shadow-sm">Save</button>
                            </div>
                        </div>
                        <div id="plans-list" class="flex flex-col gap-2 empty:hidden"></div>
                    </div>

                    <div>
                        <div class="text-aw-enemy font-semibold border-b border-border pb-1 mb-2">Fleets in Orbit</div>
                        <div id="intel-fleets-list" class="flex flex-col gap-1.5"></div>
                    </div>

                    <div>
                        <div class="text-muted-foreground font-semibold border-b border-border pb-1 mb-2">Recent History</div>
                        <div id="intel-history-list" class="flex flex-col gap-1.5"></div>
                    </div>
                </div>
                <button id="btn-ctx-map" onclick="copyToDiscord('map')" class="h-10 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground hidden transition-colors mt-2">
                    <i class="fa-solid fa-map w-6 text-center text-sm"></i>
                    <div class="ml-4 flex flex-col items-start sidebar-text">
                        <span class="text-xs text-muted-foreground uppercase leading-tight">Coordinates</span>
                        <span id="ui-map-coords" class="font-mono font-medium text-foreground leading-tight">X: -- / Y: --</span>
                    </div>
                </button>
            </div>

            <div id="player-context-tools" class="flex flex-col pb-4 border-b border-border hidden">
                <div class="px-4 py-2 text-xs text-muted-foreground font-semibold uppercase tracking-wider hide-collapsed flex justify-between items-center">
                    <span>Player Intel</span><span id="ui-player-id" class="text-foreground font-mono hidden">--</span>
                </div>
                <div id="player-intel-container" class="px-4 py-2 hide-collapsed flex flex-col gap-4 text-sm">
                    <div>
                        <div class="text-muted-foreground font-semibold border-b border-border pb-1 mb-2">Overview</div>
                        <div id="player-stats-list" class="flex flex-col gap-1.5 text-sm">
                            <span class="text-muted-foreground italic text-center py-2"><i class="fa-solid fa-circle-notch fa-spin"></i> Analyzing...</span>
                        </div>
                    </div>
                    <div>
                        <div class="text-muted-foreground font-semibold border-b border-border pb-1 mb-2">Activity Log</div>
                        <div class="bg-card border border-border rounded p-2 shadow-sm h-40 w-full">
                            <canvas id="playerActivityChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col py-4 border-b border-border hide-collapsed">
                <div class="px-4 pb-2 text-xs text-muted-foreground font-semibold uppercase tracking-wider">Database Search</div>
                <div class="px-4 mb-3 relative">
                    <input type="text" id="search-player-input" placeholder="Player Name or ID..." class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring pe-8" oninput="handleSearchInput('player')">
                    <i class="fa-solid fa-magnifying-glass absolute right-7 top-2.5 text-muted-foreground text-sm pointer-events-none"></i>
                    <div id="search-player-results" class="mt-2 flex flex-col gap-1 max-h-40 overflow-y-auto empty:hidden"></div>
                </div>
                <div class="px-4 relative">
                    <input type="text" id="search-system-input" placeholder="System Name or ID..." class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring pe-8" oninput="handleSearchInput('system')">
                    <i class="fa-solid fa-magnifying-glass absolute right-7 top-2.5 text-muted-foreground text-sm pointer-events-none"></i>
                    <div id="search-system-results" class="mt-2 flex flex-col gap-1 max-h-40 overflow-y-auto empty:hidden"></div>
                </div>
            </div>

            <div class="flex flex-col py-2 border-b border-border">
                <div class="px-4 py-2 text-xs text-muted-foreground font-semibold uppercase tracking-wider hide-collapsed">Archives</div>
                <button onclick="openDatabasePanel()" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-colors">
                    <i class="fa-solid fa-hand-fist w-6 text-center text-sm"></i><span class="ml-4 sidebar-text text-sm">Players</span>
                </button>
                <button onclick="openSystemDatabasePanel()" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-colors">
                    <i class="fa-solid fa-meteor w-6 text-center text-sm"></i><span class="ml-4 sidebar-text text-sm">Systems</span>
                </button>
                <button onclick="openPlanetDatabasePanel()" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-colors">
                    <i class="fa-solid fa-globe w-6 text-center text-sm"></i><span class="ml-4 sidebar-text text-sm">Planets</span>
                </button>
                <button onclick="openFleetDatabasePanel()" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-colors">
                    <i class="fa-solid fa-crow w-6 text-center text-sm"></i><span class="ml-4 sidebar-text text-sm">Fleets</span>
                </button>
            </div>

            <div class="flex flex-col py-4 hide-collapsed mt-auto">
                <div class="px-4 pb-2 text-xs text-muted-foreground font-semibold uppercase tracking-wider">Scrapers</div>
                <div class="px-4 flex flex-row gap-2">
                    <button id="btn-mass-scan" class="inline-flex items-center justify-center w-1/2 h-9 rounded-md bg-secondary text-secondary-foreground font-medium hover:bg-secondary/80 transition-colors text-sm gap-2 shadow-sm" title="Scan Galaxy"><i class="fa-solid fa-satellite-dish"></i> Galaxy</button>
                    <button id="btn-mass-scan-players" class="inline-flex items-center justify-center w-1/2 h-9 rounded-md bg-secondary text-secondary-foreground font-medium hover:bg-secondary/80 transition-colors text-sm gap-2 shadow-sm" title="Scan Players"><i class="fa-solid fa-user-astronaut"></i> Players</button>
                </div>
                <div id="scan-progress-container" class="px-4 mt-3 hidden flex-col gap-1.5">
                    <div class="flex justify-between text-xs text-muted-foreground font-mono"><span id="scan-status-text">Initializing...</span><span id="scan-count-text">0/0</span></div>
                    <div class="w-full bg-secondary rounded-full h-1.5 overflow-hidden"><div id="scan-progress-bar" class="bg-primary h-1.5 rounded-full transition-all duration-200" style="width: 0%"></div></div>
                </div>
            </div>
        </div>

        <div class="border-t border-border flex flex-row shrink-0 h-12 bg-background hide-collapsed mt-auto">
            <button id="admin-panel-btn" onclick="window.location.href='/admin'" style="display: none;" class="flex-1 items-center justify-center hover:bg-accent text-muted-foreground hover:text-foreground transition-colors border-r border-border" title="Admin Settings">
                <i class="fa-solid fa-gear text-lg"></i>
            </button>
            <button onclick="logout()" class="flex-1 flex items-center justify-center hover:bg-red-950/30 text-red-400 transition-colors" title="Logout">
                <i class="fa-solid fa-right-from-bracket text-lg"></i>
            </button>
        </div>
    </nav>

    <div id="dynamic-panels-container"></div>

    <div id="toast" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-secondary border border-border text-foreground text-xs font-semibold py-2.5 px-4 rounded-md shadow-lg flex items-center gap-2 pointer-events-none toast-enter z-50">
        <i class="fa-solid fa-circle-check text-green-500"></i> <span id="toast-msg">Copied</span>
    </div>

    <script>
        let toolUser = null; let currentSystemId = null; 

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            document.getElementById('game-frame').src = urlParams.get('p') || '/';
            if (localStorage.getItem('sidebarOpen') === 'true') {
                document.getElementById('sidebar').classList.add('expanded');
                document.getElementById('mobile-trigger').classList.add('hidden');
                refreshDbStats(); 
            } else if (window.innerWidth < 768) document.getElementById('mobile-trigger').classList.remove('hidden');
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mobileBtn = document.getElementById('mobile-trigger');
            sidebar.classList.toggle('expanded');
            const isOpen = sidebar.classList.contains('expanded');
            localStorage.setItem('sidebarOpen', isOpen);
            if (window.innerWidth < 768) isOpen ? mobileBtn.classList.add('hidden') : mobileBtn.classList.remove('hidden');
            if (isOpen) refreshDbStats();
        }

        function toggleSystemIntelView() {
            const container = document.getElementById('system-intel-container');
            container.classList.toggle('hidden'); container.classList.toggle('flex');
        }

        async function initWrapper() {
            const res = await fetch('/hub-api/me');
            if (res.ok) {
                toolUser = await res.json();
                document.getElementById('auth-user-display').innerText = `(${toolUser.gameName})`;
                if (toolUser.role === 'admin') document.getElementById('admin-panel-btn').style.display = 'flex';
            }
        }
        initWrapper();

        async function refreshDbStats() {
            try {
                const res = await fetch('/hub-api/intel/summary');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('stat-planets').innerText = data.planets;
                    document.getElementById('stat-players').innerText = data.players;
                    document.getElementById('stat-fleets').innerText = data.fleets || 0;
                    document.getElementById('stat-alliances').innerText = data.alliances;
                }
            } catch (err) {}
        }

        async function loadPlans(sysId) {
            if (!sysId) return;
            try {
                const res = await fetch(`/hub-api/intel/system/${sysId}`);
                const data = await res.json();
                if (!data.success) return;

                const list = document.getElementById('plans-list');
                list.innerHTML = '';
                if (data.plans.length > 0) {
                    data.plans.forEach(p => {
                        list.innerHTML += `<div class="bg-card border border-border p-3 rounded-lg plan-card relative group shadow-sm"><div class="flex justify-between items-start mb-1.5"><span class="text-foreground font-semibold text-xs">Planet #${p.planet_index}</span><button onclick="deletePlan(${p.planet_index})" class="text-muted-foreground hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-solid fa-trash text-xs"></i></button></div><p class="text-muted-foreground text-xs mb-2">${p.note}</p><div class="text-[9px] text-muted-foreground opacity-70 text-right">by ${p.author || 'Unknown'}</div></div>`;
                    });
                }
                document.getElementById('intel-planets-list').innerHTML = data.planets.map(p => `<div class="flex justify-between items-center py-0.5"><span class="text-muted-foreground">#${p.planet_index}</span><span class="font-medium">${p.owner_name ? `[${p.alliance_tag || '?'}] ${p.owner_name}` : 'Empty'}</span></div>`).join('');
                document.getElementById('intel-fleets-list').innerHTML = data.fleets.length ? data.fleets.map(f => {
                    const cv = (f.destroyers * 3) + (f.cruisers * 24) + (f.battleships * 60);
                    let statBadge = '';
                    
                    // If arrival_time is present, it's in transit. Otherwise, it's stationed.
                    if(f.arrival_time && f.arrival_time !== '-') {
                        statBadge = `<span class="text-[9px] bg-red-500/20 text-red-400 px-1 rounded ml-1">Transit: ${f.arrival_time}</span>`;
                    }
                    
                    return `<div class="flex justify-between items-center py-0.5 text-[10px]">
                        <span class="text-muted-foreground">At #${f.planet_index} ${statBadge}</span>
                        <span class="text-red-400 font-medium">by [${f.alliance_tag || '?'}] ${f.owner_name || 'Unknown'} (CV: ${cv.toLocaleString()})</span>
                    </div>`;
                }).join('') : '<span class="text-muted-foreground italic text-center py-2">No fleets detected.</span>';
                document.getElementById('intel-history-list').innerHTML = data.history.length ? data.history.map(h => `<div class="text-[10px] leading-tight mb-2 border-l-2 border-border pl-2"><span class="text-muted-foreground">${new Date(h.timestamp).toLocaleTimeString()} (#${h.planet_index})</span><br>${h.event_type_id === 1 ? `<span class="text-foreground font-medium">${h.old_owner || 'None'} &rarr; ${h.new_owner || 'None'}</span>` : `<span class="text-red-400 font-medium">Population Drop</span>`}</div>`).join('') : '<span class="text-muted-foreground italic text-center py-2">No recent history.</span>';

                const iframe = document.getElementById('game-frame');
                if (iframe.contentWindow) iframe.contentWindow.postMessage({ type: 'INJECT_TACTICAL_OVERLAYS', payload: { plans: data.plans, fleets: data.fleets, planets: data.planets } }, window.location.origin);
            } catch (err) {}
        }

        async function savePlan() {
            const pIdx = document.getElementById('plan-planet-idx').value;
            const note = document.getElementById('plan-note').value;
            if (!currentSystemId || !pIdx || !note) return showToast('Fill all fields');
            try {
                const res = await fetch('/hub-api/plans', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ system_id: currentSystemId, planet_index: pIdx, note }) });
                if (res.ok) { document.getElementById('plan-planet-idx').value = ''; document.getElementById('plan-note').value = ''; loadPlans(currentSystemId); showToast('Plan Saved'); }
            } catch (err) {}
        }

        async function deletePlan(pIdx) {
            if (!currentSystemId || !confirm("Delete this plan?")) return;
            try {
                const res = await fetch(`/hub-api/plans/${currentSystemId}/${pIdx}`, { method: 'DELETE' });
                if (res.ok) { loadPlans(currentSystemId); showToast('Plan Deleted'); }
            } catch (err) {}
        }

        // --- CHART INITIALIZATION TRACKER ---
    let playerActivityChartInstance = null;

    async function loadPlayerIntel(playerId) {
        if (!playerId) return;
        try {
            // NOTE: Make sure this endpoint exists in your backend to return player metrics and historical activity points
            const res = await fetch(`/hub-api/intel/player/${playerId}`);
            const data = await res.json();
            
            if (data.success && data.player) {
                const p = data.player;
                document.getElementById('player-stats-list').innerHTML = `
                    <div class="flex justify-between items-center py-0.5"><span class="text-muted-foreground">Points</span><span class="font-medium text-primary">${(p.points || 0).toLocaleString()}</span></div>
                    <div class="flex justify-between items-center py-0.5"><span class="text-muted-foreground">Planets</span><span class="font-medium">${p.planet_count || 0}</span></div>
                    <div class="flex justify-between items-center py-0.5"><span class="text-muted-foreground">Alliance</span><span class="font-medium text-aw-warning">${p.alliance_tag ? `[${p.alliance_tag}]` : 'None'}</span></div>
                    <div class="flex justify-between items-center py-0.5"><span class="text-muted-foreground">Status</span><span class="font-mono text-sm ${p.idle_time && p.idle_time.includes('Online') ? 'text-green-400' : 'text-muted-foreground'}">${p.idle_time || 'Unknown'}</span></div>
                `;

                // Draw Chart.js Line Chart
                if (data.activity && data.activity.length > 0) {
                    const ctx = document.getElementById('playerActivityChart').getContext('2d');
                    if (playerActivityChartInstance) playerActivityChartInstance.destroy();
                    
                    playerActivityChartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.activity.map(a => a.date), // e.g. dates or timestamps
                            datasets: [{
                                label: 'Points',
                                data: data.activity.map(a => a.points),
                                borderColor: '#ffffff',
                                backgroundColor: 'rgba(255, 255, 255, 0.05)',
                                borderWidth: 2,
                                fill: true,
                                tension: 0.3,
                                pointRadius: 2
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                x: { display: false },
                                y: { 
                                    ticks: { color: 'hsl(240 5% 64.9%)', font: { size: 10 } }, 
                                    grid: { color: 'hsl(240 3.7% 15.9%)' } 
                                }
                            }
                        }
                    });
                }
            }
        } catch (err) {
            console.error("Failed to load player intel", err);
            document.getElementById('player-stats-list').innerHTML = '<span class="text-red-400">Failed to load data.</span>';
        }
    }

        window.addEventListener('message', async (event) => {
            if (event.origin !== window.location.origin) return;
            const data = event.data;

            if (data.type === 'GAME_CONTEXT') {
                const p = data.payload;
                if (p.path) {
                    const currentUrl = new URL(window.location);
                    if (currentUrl.searchParams.get('p') !== p.path) window.history.replaceState(null, '', `/dashboard?p=${p.path}`);
                }

                if (p.playerName && toolUser && toolUser.gameName) {
                    if (toolUser.role !== 'admin' && p.playerName.toLowerCase() !== toolUser.gameName.toLowerCase()) {
                        const response = await fetch('/hub-api/nuke', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ detectedName: p.playerName }) });
                        const nukeData = await response.json();
                        if (nukeData.banned) {
                            document.body.innerHTML = `<div style="color:red; font-size:24px; padding:50px; text-align:center;"><h1>SECURITY BREACH DETECTED</h1><p>Banned.</p></div>`;
                            setTimeout(() => window.location.href = '/hub-assets/login.html', 3000);
                            return;
                        }
                    }
                }

                const ctxContainer = document.getElementById('context-tools');
                const playerCtxContainer = document.getElementById('player-context-tools');
                const btnMap = document.getElementById('btn-ctx-map');
                const sysLabel = document.getElementById('ui-sys-id');
                const playerLabel = document.getElementById('ui-player-id');
                
                // Hide all contextual blocks initially
                ctxContainer.classList.add('hidden');
                playerCtxContainer.classList.add('hidden');
                btnMap.classList.add('hidden');
                sysLabel.classList.add('hidden');
                playerLabel.classList.add('hidden');

                if (p.isSystemView && p.systemId) {
                    currentSystemId = p.systemId;
                    ctxContainer.classList.remove('hidden'); 
                    sysLabel.classList.remove('hidden');
                    sysLabel.innerText = `Sys #${p.systemId}`;
                    loadPlans(p.systemId);
                } 
                else if (p.isPlayerView && p.playerId) { // Make sure your scraper sends isPlayerView flag
                    playerCtxContainer.classList.remove('hidden');
                    playerLabel.classList.remove('hidden');
                    playerLabel.innerText = `#${p.playerId}`;
                    loadPlayerIntel(p.playerId);
                }

                if (p.isMap && p.mapX && p.mapY) {
                    ctxContainer.classList.remove('hidden'); 
                    btnMap.classList.remove('hidden');
                    document.getElementById('ui-map-coords').innerText = `${p.mapX} / ${p.mapY}`;
                }
            } else if (data.type === 'SHOW_TOAST') {
                showToast(data.payload);
                refreshDbStats();
            }
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.classList.add('toast-active'); toast.classList.remove('toast-enter');
            setTimeout(() => { toast.classList.remove('toast-active'); toast.classList.add('toast-enter'); }, 2500);
        }

        function copyToDiscord(type) {
            if (type === 'map') {
                navigator.clipboard.writeText(`Target Coordinates: ${document.getElementById('ui-map-coords').innerText}`);
                showToast('Coordinates Copied');
            }
        }

        async function logout() { await fetch('/hub-api/logout', { method: 'POST' }); window.location.href = '/hub-assets/login.html'; }

        // ==========================================
        // DATABASE SEARCH LOGIC (SIDEBAR)
        // ==========================================
        let searchTimeout;
        function handleSearchInput(type) { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { executeSearch(type); }, 300); }

        async function executeSearch(type) {
            const input = document.getElementById(`search-${type}-input`);
            const resultsContainer = document.getElementById(`search-${type}-results`);
            const q = input.value.trim();
            if (!q) { resultsContainer.innerHTML = ''; return; }

            resultsContainer.innerHTML = '<div class="text-[10px] text-muted-foreground text-center py-2"><i class="fa-solid fa-circle-notch fa-spin"></i> Searching...</div>';
            try {
                const res = await fetch(`/hub-api/search/${type}?q=${encodeURIComponent(q)}`);
                const data = await res.json();

                if (!data.success || data.results.length === 0) {
                    resultsContainer.innerHTML = '<div class="text-[10px] text-muted-foreground text-center py-2 bg-card rounded border border-border">No records found.</div>';
                    return;
                }

                if (type === 'player') {
                    resultsContainer.innerHTML = data.results.map(p => `<button onclick="navToIframe('/Game/Players/Profile/${p.id}')" class="text-left w-full bg-card border border-border hover:bg-accent hover:text-accent-foreground rounded-md p-2 text-xs transition-colors flex justify-between items-center group shadow-sm"><span class="truncate font-medium">${p.alliance_tag ? `<span class="text-muted-foreground font-normal">[${p.alliance_tag}]</span> ` : ''}${p.name}</span><span class="text-[9px] text-muted-foreground font-mono">#${p.id}</span></button>`).join('');
                } else if (type === 'system') {
                    resultsContainer.innerHTML = data.results.map(s => `<button onclick="navToIframe('/Game/Map/SolarSystem/${s.id}')" class="text-left w-full bg-card border border-border hover:bg-accent hover:text-accent-foreground rounded-md p-2 text-xs transition-colors flex justify-between items-center group shadow-sm"><span class="truncate font-medium">${s.name}</span><span class="text-[9px] text-muted-foreground font-mono">#${s.id} (${s.x}/${s.y})</span></button>`).join('');
                }
            } catch (err) { resultsContainer.innerHTML = '<div class="text-[10px] text-red-500 text-center py-2">Search failed.</div>'; }
        }

        function navToIframe(path) {
            document.getElementById('game-frame').src = path;
            document.getElementById('search-player-results').innerHTML = ''; document.getElementById('search-system-results').innerHTML = '';
            document.getElementById('search-player-input').value = ''; document.getElementById('search-system-input').value = '';
            if (window.innerWidth < 768) toggleSidebar();
        }

        // ==========================================
        // PLAYER DATABASE FULL-SCREEN PANEL
        // ==========================================
        let rawDbPlayers = []; let dbSortCol = 'points'; let dbSortDesc = true;

        async function openDatabasePanel() {
            // 1. Check if we already injected it
            let panel = document.getElementById('database-panel');
            
            // 2. If it doesn't exist in the DOM, fetch it from the server
            if (!panel) {
                try {
                    const res = await fetch('/components/players-db.html');
                    const html = await res.text();
                    document.getElementById('dynamic-panels-container').insertAdjacentHTML('beforeend', html);
                    panel = document.getElementById('database-panel');
                } catch (err) {
                    console.error("Failed to load Player DB Component", err);
                    return;
                }
            }

            // 3. Execute normal open logic
            if (panel.classList.contains('translate-x-0')) return closeDatabasePanel();
            
            closeSystemDatabasePanel(); 
            closePlanetDatabasePanel(); 
            closeFleetDatabasePanel();

            panel.classList.replace('translate-x-full', 'translate-x-0');
            if (document.getElementById('sidebar').classList.contains('expanded')) toggleSidebar();
            
            document.getElementById('db-table-body').innerHTML = '<tr><td colspan="16" class="text-center py-8 text-muted-foreground"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading Intelligence...</td></tr>';
            
            try {
                const res = await fetch('/hub-api/intel/players');
                const data = await res.json();
                if (data.success) { 
                    rawDbPlayers = data.players; 
                    renderPlayerTable(); 
                }
            } catch (err) { 
                document.getElementById('db-table-body').innerHTML = '<tr><td colspan="16" class="text-center py-8 text-red-500">Failed to load data.</td></tr>'; 
            }
        }
        function closeDatabasePanel() { document.getElementById('database-panel').classList.replace('translate-x-0', 'translate-x-full'); }
        function sortDb(col) { if (dbSortCol === col) dbSortDesc = !dbSortDesc; else { dbSortCol = col; dbSortDesc = true; } renderPlayerTable(); }

        function parseIdleTime(str) {
            if (!str || str.toLowerCase().includes('online')) return 0;
            let val = parseInt(str.replace(/[^0-9]/g, ''), 10);
            if (isNaN(val)) return 99999999;
            if (str.includes('s')) return val;
            if (str.includes('m')) return val * 60;
            if (str.includes('h')) return val * 3600;
            if (str.includes('d')) return val * 86400;
            return val;
        }

        function renderPlayerTable() {
            const rawQuery = document.getElementById('db-search-input').value.trim();
            const query = rawQuery.toLowerCase();
            const isStrictAllySearch = rawQuery.startsWith('[') && rawQuery.endsWith(']');
            const strictAllyTarget = isStrictAllySearch ? query.slice(1, -1) : null;

            let filtered = rawDbPlayers.filter(p => {
                if (isStrictAllySearch) return p.alliance_tag && p.alliance_tag.toLowerCase() === strictAllyTarget;
                return (p.name && p.name.toLowerCase().includes(query)) || (p.alliance_tag && p.alliance_tag.toLowerCase() === query) || (p.id.toString() === query);
            });

            document.getElementById('db-result-count').innerText = filtered.length;

            filtered.sort((a, b) => {
                if (dbSortCol === 'idle_time') {
                    let valA = parseIdleTime(a.idle_time); let valB = parseIdleTime(b.idle_time);
                    return dbSortDesc ? valB - valA : valA - valB; 
                }
                let valA = a[dbSortCol] ?? ''; let valB = b[dbSortCol] ?? '';
                if (typeof valA === 'string') valA = valA.toLowerCase(); if (typeof valB === 'string') valB = valB.toLowerCase();
                if (valA < valB) return dbSortDesc ? 1 : -1; if (valA > valB) return dbSortDesc ? -1 : 1; return 0;
            });

            document.getElementById('db-table-body').innerHTML = filtered.map(p => `
                <tr class="hover:bg-muted/50 transition-colors group">
                    <td class="p-3 font-mono text-muted-foreground text-[10px]"><button onclick="navToIframe('/Game/Players/Profile/${p.id}'); closeDatabasePanel();" class="hover:text-primary transition-colors">#${p.id}</button></td>
                    <td class="p-3 font-medium text-foreground">${p.name || 'Unknown'}</td>
                    <td class="p-3 text-aw-warning font-semibold">${p.alliance_tag ? `[${p.alliance_tag}]` : ''}</td>
                    <td class="p-3">${p.level || 0}</td>
                    <td class="p-3 font-semibold text-primary">${(p.points || 0).toLocaleString()}</td>
                    <td class="p-3 border-l border-border/50 text-center font-mono"><span class="${p.planet_count > p.culture_level ? 'text-red-400' : 'text-gray-300'}">${p.planet_count || 0}</span> <span class="text-muted-foreground opacity-50">/</span> <span class="text-muted-foreground">${p.culture_level || 0}</span></td>
                    <td class="p-3 font-mono text-xs ${p.idle_time && p.idle_time.includes('Online') ? 'text-green-400' : 'text-muted-foreground'}">${p.idle_time || '-'}</td>
                    <td class="p-3 text-muted-foreground border-l border-border/50 font-mono text-[11px]">${p.artefact || '-'}</td>
                    <td class="p-3 text-aw-ally">${p.trade_revenue ? `+${p.trade_revenue}%` : '-'}</td>
                    <td class="p-3 text-blue-400/80 border-l border-border/50 font-mono">${p.physics || 0}</td>
                    <td class="p-3 text-green-400/80 font-mono">${p.biology || 0}</td>
                    <td class="p-3 text-yellow-400/80 font-mono">${p.economy || 0}</td>
                    <td class="p-3 text-purple-400/80 font-mono">${p.energy || 0}</td>
                    <td class="p-3 text-orange-400/80 font-mono">${p.mathematics || 0}</td>
                    <td class="p-3 text-pink-400/80 border-r border-border/50 font-mono">${p.social || 0}</td>
                    <td class="p-3 text-[10px] text-muted-foreground opacity-70">${p.updated_at ? new Date(p.updated_at).toLocaleDateString() : 'Never'}</td>
                </tr>
            `).join('');
        }

        // ==========================================
        // SYSTEM DATABASE FULL-SCREEN PANEL
        // ==========================================
        let rawDbSystems = []; let sysDbSortCol = 'id'; let sysDbSortDesc = false;

        async function openSystemDatabasePanel() {
            const panel = document.getElementById('system-database-panel');
            if (panel.classList.contains('translate-x-0')) return closeSystemDatabasePanel();
            
            closeDatabasePanel(); closePlanetDatabasePanel(); closeFleetDatabasePanel();

            panel.classList.replace('translate-x-full', 'translate-x-0');
            if (document.getElementById('sidebar').classList.contains('expanded')) toggleSidebar();
            document.getElementById('sys-db-table-body').innerHTML = '<tr><td colspan="7" class="text-center py-8 text-muted-foreground"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading Archive...</td></tr>';

                const res = await fetch('/hub-api/intel/systems_db');
                const data = await res.json();
                if (data.success) { rawDbSystems = data.systems; renderSystemTable(); }
            } catch (err) { document.getElementById('sys-db-table-body').innerHTML = '<tr><td colspan="7" class="text-center py-8 text-red-500">Failed to load data.</td></tr>'; }
        }
        function closeSystemDatabasePanel() { document.getElementById('system-database-panel').classList.replace('translate-x-0', 'translate-x-full'); }
        function sortSysDb(col) { if (sysDbSortCol === col) sysDbSortDesc = !sysDbSortDesc; else { sysDbSortCol = col; sysDbSortDesc = true; } renderSystemTable(); }

        function renderSystemTable() {
            const query = document.getElementById('sys-db-search-input').value.toLowerCase().trim();
            
            // Safe filtering that prevents null toString() crashes
            let filtered = rawDbSystems.filter(s => {
                const xStr = s.x !== null ? s.x.toString() : '';
                const yStr = s.y !== null ? s.y.toString() : '';
                return (s.name && s.name.toLowerCase().includes(query)) || 
                       (s.id.toString() === query) || 
                       (xStr === query) || 
                       (yStr === query);
            });
            
            document.getElementById('sys-db-result-count').innerText = filtered.length;

            filtered.sort((a, b) => {
                let valA = a[sysDbSortCol] ?? ''; let valB = b[sysDbSortCol] ?? '';
                if (typeof valA === 'string') valA = valA.toLowerCase(); if (typeof valB === 'string') valB = valB.toLowerCase();
                if (valA < valB) return sysDbSortDesc ? 1 : -1; if (valA > valB) return sysDbSortDesc ? -1 : 1; return 0;
            });

            document.getElementById('sys-db-table-body').innerHTML = filtered.map(s => `
                <tr class="hover:bg-muted/50 transition-colors group">
                    <td class="p-3 font-mono text-muted-foreground text-[10px]"><button onclick="navToIframe('/Game/Map/SolarSystem/${s.id}'); closeSystemDatabasePanel();" class="hover:text-primary transition-colors">#${s.id}</button></td>

                    <td class="p-3 text-aw-enemy font-medium">${s.fleet_count || 0}</td>
                    <td class="p-3 border-l border-border/50 text-[10px] text-muted-foreground opacity-70">${s.updated_at ? new Date(s.updated_at).toLocaleDateString() : 'Never'}</td>
                </tr>
            `).join('');
        }

        // ==========================================
        // PLANET DATABASE FULL-SCREEN PANEL
        // ==========================================
        let rawDbPlanets = []; let plnDbSortCol = 'population'; let plnDbSortDesc = true;

        async function openPlanetDatabasePanel() {

        }
        function closePlanetDatabasePanel() { document.getElementById('planet-database-panel').classList.replace('translate-x-0', 'translate-x-full'); }
        function sortPlnDb(col) { if (plnDbSortCol === col) plnDbSortDesc = !plnDbSortDesc; else { plnDbSortCol = col; plnDbSortDesc = true; } renderPlanetTable(); }

        function renderPlanetTable() {
            const rawQuery = document.getElementById('pln-db-search-input').value.trim();

                if (typeof valA === 'string') valA = valA.toLowerCase(); if (typeof valB === 'string') valB = valB.toLowerCase();
                if (valA < valB) return plnDbSortDesc ? 1 : -1; if (valA > valB) return plnDbSortDesc ? -1 : 1; return 0;
            });

            document.getElementById('pln-db-table-body').innerHTML = filtered.map(p => `
                <tr class="hover:bg-muted/50 transition-colors group ${p.is_sieged ? 'bg-red-950/20' : ''}">
                    <td class="p-3 font-mono text-muted-foreground text-[10px]"><button onclick="navToIframe('/Game/Map/SolarSystem/${p.system_id}'); closePlanetDatabasePanel();" class="hover:text-primary transition-colors">#${p.system_id}</button></td>
                    <td class="p-3 font-medium text-foreground">${p.system_name || 'Unknown'} <span class="text-[9px] font-mono text-muted-foreground">(${p.x !== null ? p.x : '-'}/${p.y !== null ? p.y : '-'})</span></td>
                    <td class="p-3 font-mono text-foreground">${p.planet_index}</td>
                    <td class="p-3 font-medium text-foreground border-l border-border/50">${p.owner_name || 'Empty'}</td>
                    <td class="p-3 text-aw-warning font-semibold">${p.alliance_tag ? `[${p.alliance_tag}]` : ''}</td>
                    <td class="p-3 font-semibold text-primary border-l border-border/50">${p.population || 0}</td>
                    <td class="p-3 text-aw-warning font-mono">${p.starbase || 0}</td>
                    <td class="p-3 border-l border-border/50 text-[10px] text-muted-foreground opacity-70">${p.updated_at ? new Date(p.updated_at).toLocaleDateString() : 'Never'}</td>

        }

        // ==========================================
        // FLEETS DATABASE FULL-SCREEN PANEL
        // ==========================================
        let rawDbFleets = []; let fltDbSortCol = 'battleships'; let fltDbSortDesc = true;

        async function openFleetDatabasePanel() {
            const panel = document.getElementById('fleet-database-panel');
            if (panel.classList.contains('translate-x-0')) return closeFleetDatabasePanel();
            
            closeDatabasePanel(); closeSystemDatabasePanel(); closePlanetDatabasePanel();

            panel.classList.replace('translate-x-full', 'translate-x-0');
            if (document.getElementById('sidebar').classList.contains('expanded')) toggleSidebar();
            document.getElementById('flt-db-table-body').innerHTML = '<tr><td colspan="9" class="text-center py-8 text-muted-foreground"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading Archive...</td></tr>';
            try {
                const res = await fetch('/hub-api/intel/fleets_db');
                const data = await res.json();
                if (data.success) { 
                    rawDbFleets = data.fleets.map(f => ({...f, cv: (f.destroyers * 3) + (f.cruisers * 24) + (f.battleships * 60)})); 
                    renderFleetTable(); 
                }
            } catch (err) { document.getElementById('flt-db-table-body').innerHTML = '<tr><td colspan="9" class="text-center py-8 text-red-500">Failed to load data.</td></tr>'; }
        }
        function closeFleetDatabasePanel() { document.getElementById('fleet-database-panel').classList.replace('translate-x-0', 'translate-x-full'); }
        function sortFltDb(col) { if (fltDbSortCol === col) fltDbSortDesc = !fltDbSortDesc; else { fltDbSortCol = col; fltDbSortDesc = true; } renderFleetTable(); }

        function renderFleetTable() {
            const rawQuery = document.getElementById('flt-db-search-input').value.trim();
            const query = rawQuery.toLowerCase();
            const isStrictAllySearch = rawQuery.startsWith('[') && rawQuery.endsWith(']');
            const strictAllyTarget = isStrictAllySearch ? query.slice(1, -1) : null;

            let filtered = rawDbFleets.filter(f => {
                if (isStrictAllySearch) return f.alliance_tag && f.alliance_tag.toLowerCase() === strictAllyTarget;
                return (f.owner_name && f.owner_name.toLowerCase().includes(query)) || 
                       (f.alliance_tag && f.alliance_tag.toLowerCase() === query) || 
                       (f.system_name && f.system_name.toLowerCase().includes(query));

                if (typeof valA === 'string') valA = valA.toLowerCase(); if (typeof valB === 'string') valB = valB.toLowerCase();

                <tr class="hover:bg-muted/50 transition-colors group">
                    <td class="p-3 font-medium text-foreground"><button onclick="navToIframe('/Game/Map/SolarSystem/${f.system_id}'); closeFleetDatabasePanel();" class="hover:text-primary transition-colors">${f.system_name || 'Unknown'}</button> <span class="text-[9px] font-mono text-muted-foreground">(${f.x !== null ? f.x : '-'}/${f.y !== null ? f.y : '-'})</span></td>
                    <td class="p-3 font-mono text-foreground">${f.planet_index}</td>

                    <td class="p-3 text-aw-warning font-semibold">${f.alliance_tag ? `[${f.alliance_tag}]` : ''}</td>
                    <td class="p-3 font-mono text-gray-300 border-l border-border/50">${f.transports || 0}</td>
                    <td class="p-3 font-mono text-gray-300">${f.colony_ships || 0}</td>
                    <td class="p-3 font-mono text-red-400/90 border-l border-border/50">${f.destroyers || 0}</td>
                    <td class="p-3 font-mono text-red-400/90">${f.cruisers || 0}</td>
                    <td class="p-3 font-mono text-red-400/90">${f.battleships || 0}</td>
                    <td class="p-3 font-mono text-aw-warning font-bold border-l border-border/50">${f.cv.toLocaleString()}</td>

    <script type="module">
        import { runMassScan, runPlayerScan } from '/hub-assets/js/scrapers/mass-scanner.js';
        const container = document.getElementById('scan-progress-container');
        const textStatus = document.getElementById('scan-status-text');
        const textCount = document.getElementById('scan-count-text');
        const bar = document.getElementById('scan-progress-bar');
        
        const updateUI = (statusMsg, current, total) => {
            textStatus.innerText = statusMsg; textCount.innerText = total > 0 ? `${current}/${total}` : '';
            let percent = total > 0 ? Math.round((current / total) * 100) : 0;
            bar.style.width = `${Math.min(percent, 100)}%`;
        };
        const lockUI = (btn1, btn2) => { [btn1, btn2].forEach(b => { b.disabled = true; b.classList.add('opacity-50', 'pointer-events-none'); }); container.classList.replace('hidden', 'flex'); };
        const unlockUI = (btn1, btn2) => { [btn1, btn2].forEach(b => { b.disabled = false; b.classList.remove('opacity-50', 'pointer-events-none'); }); setTimeout(() => window.refreshDbStats(), 500); };

        document.getElementById('btn-mass-scan').addEventListener('click', async () => { lockUI(document.getElementById('btn-mass-scan'), document.getElementById('btn-mass-scan-players')); await runMassScan(updateUI); unlockUI(document.getElementById('btn-mass-scan'), document.getElementById('btn-mass-scan-players')); });
        document.getElementById('btn-mass-scan-players').addEventListener('click', async () => { lockUI(document.getElementById('btn-mass-scan'), document.getElementById('btn-mass-scan-players')); await runPlayerScan(updateUI); unlockUI(document.getElementById('btn-mass-scan'), document.getElementById('btn-mass-scan-players')); });
    </script>
