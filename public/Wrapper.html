<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alliance Hub - Dashboard</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        #layout { display: flex; height: 100vh; width: 100vw; overflow: hidden; position: relative; }
        
        /* The Game Container - Strict bounds */
        #game-container { flex-grow: 1; position: relative; height: 100vh; overflow: hidden; }
        
        /* The Iframe - Absolute lock */
        iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
        }
        
        /* The Sliding Sidebar */
        #sidebar { 
            width: 350px; 
            background: #121212; 
            border-left: 1px solid #333; 
            display: flex; 
            flex-direction: column;
            transition: transform 0.3s ease;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            z-index: 100;
        }
        
        /* Hidden State */
        #sidebar.closed { transform: translateX(100%); }
        
        /* UI Elements */
        .sidebar-header { background: #1a1a1a; padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-content { padding: 15px; flex-grow: 1; overflow-y: auto; background: #0f0f0f; }
        
        .btn { background: #007acc; border: none; color: white; padding: 8px 12px; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .btn-red { background: #dc3545; }
        
        /* The Floating Button */
        #toggle-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #007acc;
            color: white;
            border: 1px solid #005f9e;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            z-index: 90;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<div id="layout">
    <div id="game-container">
        <iframe id="game-frame" src="/"></iframe>
        
        <button id="toggle-btn" onclick="toggleSidebar()">Intel Hub</button>
    </div>

    <div id="sidebar" class="closed">
        <div class="sidebar-header">
            <h3 style="margin:0;">System Intel</h3>
            <button class="btn btn-red" onclick="toggleSidebar()">X</button>
        </div>
        
        <div class="sidebar-content" id="intel-content">
            <p style="color: #666; font-style: italic;">Waiting for game context...</p>
        </div>
        
        <div style="padding: 15px; border-top: 1px solid #333; background: #1a1a1a;">
            <button class="btn" style="width: 100%; margin-bottom: 10px;" onclick="window.open('/admin', '_blank')">Admin Panel</button>
            <button class="btn btn-red" style="width: 100%;" onclick="logout()">Logout</button>
        </div>
    </div>
</div>

<script>
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggle-btn');
    const intelContent = document.getElementById('intel-content');

    function toggleSidebar() {
        sidebar.classList.toggle('closed');
        toggleBtn.style.display = sidebar.classList.contains('closed') ? 'block' : 'none';
    }

    // LISTENER: Catch data being beamed up from the injected scraper script
    window.addEventListener('message', (event) => {
        // Security check
        if (event.origin !== window.location.origin) return;

        const data = event.data;
        if (data.type === 'GAME_CONTEXT') {
            updateSidebarUI(data.payload);
        }
    });

    function updateSidebarUI(payload) {
        let html = `<div style="background:#222; padding:10px; border-radius:4px; margin-bottom:15px;">
                        <span style="color:#aaa; font-size:0.8em;">URL:</span><br>
                        <span style="color:#007acc; word-break: break-all;">${payload.path}</span>
                    </div>`;
        
        if (payload.isSystemView) {
            html += `<h4 style="color:#28a745; margin-top:0;">System ${payload.systemId}</h4>`;
            html += `<p>Scraper is ready to parse planet tables here.</p>`;
            if (sidebar.classList.contains('closed')) toggleSidebar();
            
        } else if (payload.isMap) {
            html += `<h4 style="color:#ffc107; margin-top:0;">Galaxy Map</h4>`;
            
            // Display the live coordinates hijacked from the network!
            if (payload.mapX && payload.mapY) {
                html += `
                <div style="background:#1a1a1a; padding: 15px; border: 1px solid #ffc107; border-radius: 4px; text-align: center;">
                    <span style="color: #888; font-size: 0.9em; text-transform: uppercase;">Live Coordinates</span><br>
                    <strong style="font-size: 1.4em; color: white;">X: ${payload.mapX} <br> Y: ${payload.mapY}</strong>
                </div>`;
            } else {
                html += `<p>Targeting systems...</p>`;
            }

        } else {
            html += `<p style="color:#888;">Navigate to a System or Map to load intel tools.</p>`;
        }

        intelContent.innerHTML = html;
    }

    async function logout() {
        await fetch('/hub-api/logout', { method: 'POST' });
        window.location.href = '/hub-assets/login.html';
    }
</script>

</body>
</html>
