<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alliance Hub - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        aw: { bg: '#0d1117', panel: '#161b22', border: '#30363d', primary: '#2f81f7', enemy: '#f85149', ally: '#3fb950', warning: '#d29922', discord: '#5865F2' }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b949e; }
        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-active { transform: translateY(0); opacity: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="w-screen h-screen overflow-hidden bg-black text-gray-300 font-sans text-sm select-none relative" oncontextmenu="return false;">

    <iframe id="game-frame" src="/" class="absolute inset-0 w-full h-full border-none z-0"></iframe>

    <button id="toggle-fab" onclick="toggleSidebar()" class="absolute bottom-6 right-6 z-40 bg-aw-primary text-white w-14 h-14 rounded-full shadow-[0_0_15px_rgba(47,129,247,0.4)] hover:bg-blue-600 transition-all flex items-center justify-center border border-blue-400">
        <i class="fa-solid fa-satellite-dish text-xl"></i>
    </button>

    <div id="sidebar" class="absolute top-0 right-0 w-full sm:w-96 h-full bg-aw-bg border-l border-aw-border flex flex-col shadow-2xl z-50 transform transition-transform duration-300 translate-x-full">
        
        <div class="bg-aw-panel p-4 border-b border-aw-border flex justify-between items-center shrink-0">
            <div>
                <h2 class="font-bold text-white text-lg tracking-wide"><i class="fa-solid fa-satellite-dish text-aw-primary mr-2"></i>Intel Hub</h2>
                <span class="text-xs text-aw-ally flex items-center"><span class="w-2 h-2 rounded-full bg-aw-ally mr-1 animate-pulse"></span> Scraper Active</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="auth-user-display" class="text-xs font-mono text-gray-500"></span>
                <button onclick="toggleSidebar()" class="text-gray-500 hover:text-white transition w-8 h-8 flex items-center justify-center bg-gray-800 rounded"><i class="fa-solid fa-xmark fa-lg"></i></button>
            </div>
        </div>

        <div class="flex border-b border-aw-border shrink-0 bg-aw-panel">
            <button onclick="switchTab('system')" class="flex-1 py-2 text-center hover:bg-aw-border hover:text-white border-b-2 border-aw-primary text-white font-semibold transition" id="tab-system">System</button>
            <button onclick="switchTab('map')" class="flex-1 py-2 text-center hover:bg-aw-border hover:text-white border-b-2 border-transparent transition" id="tab-map">Map</button>
            <button onclick="switchTab('intel')" class="flex-1 py-2 text-center hover:bg-aw-border hover:text-white border-b-2 border-transparent transition" id="tab-intel">Database</button>
        </div>

        <div class="flex-1 overflow-y-auto p-3">

            <div id="view-system" class="space-y-4">
                <div class="flex justify-between items-end">
                    <div>
                        <div class="text-xs text-gray-500 uppercase tracking-wider">Current Location</div>
                        <div class="text-xl font-bold text-white flex items-center gap-2">
                            <span id="ui-sys-id">Scanning...</span>
                            <button onclick="copyToDiscord('system')" class="text-gray-500 hover:text-aw-discord transition" title="Copy to Discord">
                                <i class="fa-brands fa-discord text-sm"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="bg-aw-panel border border-aw-border rounded-md p-4 text-center">
                    <p class="text-xs text-gray-500">Waiting for system data...</p>
                </div>
            </div>

            <div id="view-map" class="hidden space-y-4">
                <div class="bg-aw-panel border border-aw-border rounded-md p-4 flex flex-col justify-center items-center relative">
                    <button onclick="copyToDiscord('map')" class="absolute top-2 right-2 text-gray-500 hover:text-aw-discord transition" title="Copy Target Coordinates">
                        <i class="fa-brands fa-discord text-sm"></i>
                    </button>
                    <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">Live Coordinates</div>
                    <div class="text-3xl font-mono font-bold text-white tracking-widest flex justify-center items-center gap-4">
                        <span class="text-aw-primary" id="ui-map-x">X: --</span>
                        <span class="text-aw-primary" id="ui-map-y">Y: --</span>
                    </div>
                </div>
            </div>

            <div id="view-intel" class="hidden space-y-4">
                <div class="relative">
                    <input type="text" placeholder="Search player or alliance..." class="w-full bg-aw-panel border border-aw-border rounded py-2 pl-8 pr-3 text-sm text-gray-300 focus:outline-none focus:border-aw-primary">
                    <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-500"></i>
                </div>
            </div>

        </div>

        <div class="bg-aw-panel p-2 border-t border-aw-border shrink-0 flex justify-between items-center z-10">
            <div class="flex gap-2">
                <button class="w-8 h-8 flex items-center justify-center bg-aw-border hover:bg-aw-primary text-gray-300 hover:text-white rounded transition" title="Toggle Overlays"><i class="fa-solid fa-layer-group"></i></button>
                <button class="w-8 h-8 flex items-center justify-center bg-aw-border hover:bg-aw-primary text-gray-300 hover:text-white rounded transition" title="Force Sync"><i class="fa-solid fa-rotate"></i></button>
            </div>
            <div class="flex gap-2">
                <button id="admin-panel-btn" onclick="window.open('/admin', '_blank')" class="w-8 h-8 flex items-center justify-center bg-aw-warning/20 text-aw-warning hover:bg-aw-warning hover:text-white border border-aw-warning rounded transition hidden" title="Admin Panel"><i class="fa-solid fa-gear"></i></button>
                <button onclick="logout()" class="w-8 h-8 flex items-center justify-center bg-red-900/50 text-red-400 hover:bg-red-900 hover:text-white border border-red-900 rounded transition" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </div>
        
        <div id="toast" class="absolute bottom-16 left-0 right-0 mx-4 bg-aw-discord text-white text-xs font-bold py-2 px-3 rounded shadow-lg flex items-center justify-center gap-2 pointer-events-none toast-enter z-50">
            <i class="fa-solid fa-circle-check"></i> <span id="toast-msg">Copied</span>
        </div>
    </div>

    <script>
        let toolUser = null;

        // --- DRAWER LOGIC ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const fab = document.getElementById('toggle-fab');
            
            // Toggle the translation class
            sidebar.classList.toggle('translate-x-full');
            
            // Hide the floating button when the sidebar is open
            if (sidebar.classList.contains('translate-x-full')) {
                fab.style.display = 'flex';
            } else {
                fab.style.display = 'none';
            }
        }

        // 1. Initialize Wrapper & Auth
        async function initWrapper() {
            const res = await fetch('/hub-api/me');
            if (res.ok) {
                toolUser = await res.json();
                document.getElementById('auth-user-display').innerText = `Auth: ${toolUser.gameName}`;
                if (toolUser.role === 'admin') {
                    document.getElementById('admin-panel-btn').classList.remove('hidden');
                }
            }
        }
        initWrapper();

        // 2. The Spy Trap & Data Receiver
        window.addEventListener('message', async (event) => {
            if (event.origin !== window.location.origin) return;
            const data = event.data;

            if (data.type === 'GAME_CONTEXT') {
                const p = data.payload;

                // THE TRAP
                if (p.playerName && toolUser && toolUser.gameName) {
                    if (p.playerName.toLowerCase() !== toolUser.gameName.toLowerCase()) {
                        
                        await fetch('/hub-api/nuke', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ detectedName: p.playerName })
                        });

                        document.body.innerHTML = `<div style="color:red; font-size:24px; padding:50px; text-align:center;">
                            <h1>SECURITY BREACH DETECTED</h1>
                            <p>Account '${toolUser.gameName}' has been permanently banned for credential sharing.</p>
                        </div>`;
                        
                        setTimeout(() => window.location.href = '/hub-assets/login.html', 3000);
                        return;
                    }
                }

                // Update UI visually
                if (p.isSystemView && p.systemId) {
                    switchTab('system');
                    document.getElementById('ui-sys-id').innerText = `System #${p.systemId}`;
                } else if (p.isMap && p.mapX && p.mapY) {
                    switchTab('map');
                    document.getElementById('ui-map-x').innerText = `X: ${p.mapX}`;
                    document.getElementById('ui-map-y').innerText = `Y: ${p.mapY}`;
                }
            }
        });

        // 3. UI Helpers
        function switchTab(tabName) {
            ['system', 'map', 'intel'].forEach(name => {
                document.getElementById('view-' + name).classList.add('hidden');
                document.getElementById('tab-' + name).classList.remove('border-aw-primary', 'text-white');
                document.getElementById('tab-' + name).classList.add('border-transparent');
            });
            document.getElementById('view-' + tabName).classList.remove('hidden');
            document.getElementById('tab-' + tabName).classList.remove('border-transparent');
            document.getElementById('tab-' + tabName).classList.add('border-aw-primary', 'text-white');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.classList.add('toast-active');
            toast.classList.remove('toast-enter');
            setTimeout(() => {
                toast.classList.remove('toast-active');
                toast.classList.add('toast-enter');
            }, 2500);
        }

        function copyToDiscord(type) {
            if (type === 'map') {
                const x = document.getElementById('ui-map-x').innerText;
                const y = document.getElementById('ui-map-y').innerText;
                navigator.clipboard.writeText(`\`\`\`yaml\nTarget Coordinates:\n${x}\n${y}\n\`\`\``);
                showToast('Coordinates Copied');
            }
        }

        async function logout() {
            await fetch('/hub-api/logout', { method: 'POST' });
            window.location.href = '/hub-assets/login.html';
        }
    </script>
</body>
</html>
