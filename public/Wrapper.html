<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alliance Hub - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/hub-assets/css/hub.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        border: "hsl(240 3.7% 15.9%)", input: "hsl(240 3.7% 15.9%)", ring: "hsl(240 4.9% 83.9%)", background: "hsl(240 10% 3.9%)", foreground: "hsl(0 0% 98%)",
                        primary: { DEFAULT: "hsl(0 0% 98%)", foreground: "hsl(240 5.9% 10%)" },
                        secondary: { DEFAULT: "hsl(240 3.7% 15.9%)", foreground: "hsl(0 0% 98%)" },
                        muted: { DEFAULT: "hsl(240 3.7% 15.9%)", foreground: "hsl(240 5% 64.9%)" },
                        accent: { DEFAULT: "hsl(240 3.7% 15.9%)", foreground: "hsl(0 0% 98%)" },
                        card: { DEFAULT: "hsl(240 10% 3.9%)", foreground: "hsl(0 0% 98%)" },
                        aw: { enemy: '#ef4444', ally: '#22c55e', warning: '#f59e0b', discord: '#5865F2' }
                    }
                }
            }
        }
    </script>
</head>
<body class="w-screen h-screen overflow-hidden bg-background text-foreground font-sans text-sm select-none">

    <main class="absolute inset-0 w-full bg-black z-0" style="height: 100dvh;">
        <iframe id="game-frame" class="w-full border-none" style="height: 100dvh;"></iframe>
    </main>

    <button id="mobile-trigger" class="hidden absolute top-12 left-4 z-40 bg-background border border-border text-foreground w-10 h-10 rounded-md shadow-sm items-center justify-center hover:bg-accent">
        <i class="fa-solid fa-bars"></i>
    </button>

    <nav id="sidebar" class="absolute top-0 left-0 h-full w-14 transition-all duration-300 bg-background/95 backdrop-blur-md border-r border-border z-50 overflow-x-hidden shadow-2xl flex flex-col">
        <button id="sidebar-toggle-btn" class="h-14 w-full flex items-center justify-start px-4 border-b border-border hover:bg-accent text-foreground shrink-0 transition-colors group">
            <i class="fa-solid fa-shuttle-space text-lg w-6 text-center group-hover:scale-110 transition-transform"></i>
            <span class="ml-4 font-semibold tracking-wide sidebar-text">Hub v2</span>
            <i class="fa-solid fa-xmark ml-auto md:hidden text-muted-foreground sidebar-text text-lg"></i>
        </button>

        <div class="flex-1 flex flex-col pt-2 overflow-y-auto">
            
            <div id="context-tools" class="flex flex-col pb-4 border-b border-border hidden">
                <div class="px-4 py-2 text-s text-muted-foreground font-semibold uppercase tracking-wider hide-collapsed flex justify-between items-center">
                    <span>System Intel</span><span id="ui-sys-id" class="text-foreground font-mono">--</span>
                </div>
            
                <div id="system-intel-container" class="px-4 py-2 hide-collapsed flex flex-col gap-4 text-sm">
                    <div>
                        <div class="text-muted-foreground font-semibold border-b border-border pb-1 mb-2">Planets</div>
                        <div id="intel-planets-list" class="flex flex-col gap-1.5"></div>
                    </div>
                    
                    <div id="system-plans-container" class="flex flex-col gap-3">
                        <div class="text-muted-foreground font-semibold border-b border-border pb-1 mb-2">Tactical Plans</div>
                        <div class="bg-card border border-border rounded-lg p-3 shadow-sm">
                            <div class="flex gap-2 mb-3">
                                <select id="plan-planet-idx" class="h-8 w-24 rounded-md border border-input bg-background px-2 py-1 text-sm shadow-sm text-muted-foreground focus:outline-none">
                                    <option value="" disabled selected>Planet #</option>
                                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                                    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                                    <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                                    <option value="10">10</option><option value="11">11</option><option value="12">12</option>
                                </select>
                                <input type="text" id="plan-note" placeholder="Instructions..." class="h-8 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm focus:outline-none">
                                <button id="save-plan-btn" class="inline-flex items-center justify-center h-8 px-3 rounded-md bg-primary text-primary-foreground font-medium hover:bg-primary/90 text-sm shadow-sm">Save</button>
                            </div>
                        </div>
                        <div id="plans-list" class="flex flex-col gap-2 empty:hidden"></div>
                    </div>

                    <div>
                        <div class="text-aw-enemy font-semibold border-b border-border pb-1 mb-2">Fleets in Orbit</div>
                        <div id="intel-fleets-list" class="flex flex-col gap-1.5"></div>
                    </div>

                    <div>
                        <div class="text-muted-foreground font-semibold border-b border-border pb-1 mb-2">Recent History</div>
                        <div id="intel-history-list" class="flex flex-col gap-1.5"></div>
                    </div>
                </div>
            </div>

            <div id="player-context-tools" class="flex flex-col pb-4 border-b border-border hidden">
                <div class="px-4 py-2 text-s text-muted-foreground font-semibold uppercase tracking-wider hide-collapsed flex justify-between items-center">
                    <span>Player Intel</span><span id="ui-player-id" class="text-foreground font-mono">--</span>
                </div>
                <div id="player-intel-container" class="px-4 py-2 hide-collapsed flex flex-col gap-4 text-sm">
                    <div>
                        <div class="text-muted-foreground font-semibold border-b border-border pb-1 mb-2">Overview</div>
                        <div id="player-stats-list" class="flex flex-col gap-1.5 text-sm"></div>
                    </div>
                    <div>
                        <div class="text-muted-foreground font-semibold border-b border-border pb-1 mb-2">Activity Log</div>
                        <div class="bg-card border border-border rounded p-2 shadow-sm h-28 w-full">
                            <canvas id="playerHeatmapChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col py-4 border-b border-border hide-collapsed">
                <div class="px-4 pb-2 text-s text-muted-foreground font-semibold uppercase tracking-wider">Database Search</div>
                <div class="px-4 mb-3 relative">
                    <input type="text" id="search-player-input" placeholder="Player Name or ID..." class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm focus:outline-none pe-8">
                    <i class="fa-solid fa-magnifying-glass absolute right-7 top-2.5 text-muted-foreground text-sm pointer-events-none"></i>
                    <div id="search-player-results" class="mt-2 flex flex-col gap-1 max-h-40 overflow-y-auto empty:hidden"></div>
                </div>
                <div class="px-4 relative">
                    <input type="text" id="search-system-input" placeholder="System Name or ID..." class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm focus:outline-none pe-8">
                    <i class="fa-solid fa-magnifying-glass absolute right-7 top-2.5 text-muted-foreground text-sm pointer-events-none"></i>
                    <div id="search-system-results" class="mt-2 flex flex-col gap-1 max-h-40 overflow-y-auto empty:hidden"></div>
                </div>
            </div>

            <div class="flex flex-col py-3 border-b border-border hide-collapsed">
                <div class="px-4 pb-2 text-s text-muted-foreground font-semibold uppercase tracking-wider">Map Overlays</div>
                <div class="px-4 flex items-center justify-between">
                    <span class="text-sm text-muted-foreground">Alliance Map Vision</span>
                    <input type="checkbox" id="toggle-alliance-vision" class="w-4 h-4 rounded border-border bg-transparent text-primary focus:ring-0 cursor-pointer">
                </div>
            </div>

            <div class="flex flex-col py-2 border-b border-border">
                <div class="px-4 py-2 text-s text-muted-foreground font-semibold uppercase tracking-wider hide-collapsed">Archives</div>
                <button id="open-war-room-btn" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-colors">
                    <i class="fa-solid fa-bomb w-6 text-center text-sm"></i> <span class="ml-4 sidebar-text text-sm">War Room</span>
                </button>
                <button id="open-alliance-stats-btn" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-colors">
                    <i class="fa-solid fa-chess w-6 text-center text-sm"></i><span class="ml-4 sidebar-text text-sm">Alliance Stats</span>
                </button>
                <button id="open-players-db-btn" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-colors">
                    <i class="fa-solid fa-hand-fist w-6 text-center text-sm"></i><span class="ml-4 sidebar-text text-sm">Players</span>
                </button>
                <button id="open-systems-db-btn" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-colors">
                    <i class="fa-solid fa-meteor w-6 text-center text-sm"></i><span class="ml-4 sidebar-text text-sm">Systems</span>
                </button>
                <button id="open-planets-db-btn" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-colors">
                    <i class="fa-solid fa-globe w-6 text-center text-sm"></i><span class="ml-4 sidebar-text text-sm">Planets</span>
                </button>
                <button id="open-fleets-db-btn" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-colors">
                    <i class="fa-solid fa-crow w-6 text-center text-sm"></i><span class="ml-4 sidebar-text text-sm">Fleets</span>
                </button>
            </div>

            <div class="flex flex-col py-4 hide-collapsed mt-auto">
                <div class="px-4 pb-2 text-s text-muted-foreground font-semibold uppercase tracking-wider">Scrapers</div>
                <div class="px-4 flex flex-row gap-2">
                    <button id="btn-mass-scan" class="inline-flex items-center justify-center w-1/2 h-9 rounded-md bg-secondary text-secondary-foreground font-medium hover:bg-secondary/80 transition-colors text-sm gap-2 shadow-sm" title="Scan Galaxy"><i class="fa-solid fa-satellite-dish"></i> Galaxy</button>
                    <button id="btn-mass-scan-players" class="inline-flex items-center justify-center w-1/2 h-9 rounded-md bg-secondary text-secondary-foreground font-medium hover:bg-secondary/80 transition-colors text-sm gap-2 shadow-sm" title="Scan Players"><i class="fa-solid fa-user-astronaut"></i> Players</button>
                </div>
                <div id="scan-progress-container" class="px-4 mt-3 hidden flex-col gap-1.5">
                    <div class="flex justify-between text-s text-muted-foreground font-mono"><span id="scan-status-text">Initializing...</span><span id="scan-count-text">0/0</span></div>
                    <div class="w-full bg-secondary rounded-full h-1.5 overflow-hidden"><div id="scan-progress-bar" class="bg-primary h-1.5 rounded-full transition-all duration-200" style="width: 0%"></div></div>
                </div>
            </div>
        </div>

        <div class="border-t border-border flex flex-row shrink-0 h-12 bg-background mt-auto">
            <button id="admin-panel-btn" style="display: none;" class="flex-1 items-center justify-center hover:bg-accent text-muted-foreground hover:text-foreground transition-colors border-r border-border" title="Admin Settings">
                <i class="fa-solid fa-gear text-lg"></i>
            </button>
            <button id="logout-btn" class="flex-1 flex items-center justify-center hover:bg-red-950/30 text-red-400 transition-colors" title="Logout">
                <i class="fa-solid fa-right-from-bracket text-lg"></i>
            </button>
        </div>
    </nav>

    <div id="dynamic-panels-container"></div>

    <div id="toast" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-secondary border border-border text-foreground text-s font-semibold py-2.5 px-4 rounded-md shadow-lg flex items-center gap-2 pointer-events-none toast-enter z-50">
        <i class="fa-solid fa-circle-check text-green-500"></i> <span id="toast-msg">Copied</span>
    </div>

    <script type="module" src="/hub-assets/js/ui/dashboard.js"></script>
</body>
</html>
