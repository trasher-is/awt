<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alliance Hub - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        aw: { bg: '#0d1117', panel: '#161b22', border: '#30363d', primary: '#2f81f7', enemy: '#f85149', ally: '#3fb950', warning: '#d29922', discord: '#5865F2' }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b949e; }
        
        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-active { transform: translateY(0); opacity: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* The Sidebar Overlay Magic */
        .sidebar-text { transition: opacity 0.2s ease-in-out; opacity: 0; white-space: nowrap; pointer-events: none; }
        
        /* Desktop Expansion */
        @media (min-width: 768px) {
            #sidebar.expanded { width: 18rem; } /* 288px */
            #sidebar.expanded .sidebar-text { opacity: 1; pointer-events: auto; }
            #sidebar:not(.expanded) .hide-collapsed { display: none; }
        }
        
        /* Mobile Full-Screen Overlay */
        @media (max-width: 767px) {
            #sidebar { transform: translateX(-100%); width: 100%; border-right: none; }
            #sidebar.expanded { transform: translateX(0); }
            #sidebar.expanded .sidebar-text { opacity: 1; pointer-events: auto; }
            /* Mobile trigger button */
            #mobile-trigger { display: flex; }
        }
    </style>
</head>
<body class="w-screen h-screen overflow-hidden bg-black text-gray-300 font-sans text-sm select-none" oncontextmenu="return false;">

    <!-- ========================================== -->
    <!-- MAIN GAME AREA (Full Screen, Underneath)   -->
    <!-- ========================================== -->
    <main class="absolute inset-0 w-full h-full bg-[#0a0a0a] z-0">
        <iframe id="game-frame" class="w-full h-full border-none"></iframe>
    </main>

    <!-- Mobile Floating Action Button (Only visible on small screens when sidebar is closed) -->
    <button id="mobile-trigger" onclick="toggleSidebar()" class="hidden absolute top-4 left-4 z-40 bg-aw-panel border border-aw-border text-aw-primary w-12 h-12 rounded-lg shadow-lg items-center justify-center">
        <i class="fa-solid fa-bars text-xl"></i>
    </button>

    <!-- ========================================== -->
    <!-- OVERLAY SIDEBAR                            -->
    <!-- ========================================== -->
    <nav id="sidebar" class="absolute top-0 left-0 h-full w-14 md:w-14 transition-all duration-300 bg-aw-panel/95 backdrop-blur-sm border-r border-aw-border flex flex-col z-50 overflow-x-hidden shadow-[5px_0_15px_rgba(0,0,0,0.5)]">
        
        <!-- Toggle & Header -->
        <button onclick="toggleSidebar()" class="h-14 w-full flex items-center justify-start px-4 border-b border-aw-border hover:bg-aw-border text-aw-primary shrink-0 transition-colors group">
            <i class="fa-solid fa-satellite-dish text-xl w-6 text-center group-hover:scale-110 transition-transform"></i>
            <span class="ml-4 font-bold tracking-wide sidebar-text">Intel Hub v2</span>
            
            <!-- Mobile Close Icon (Pushed to the right) -->
            <i class="fa-solid fa-xmark ml-auto md:hidden text-gray-500 sidebar-text text-xl"></i>
        </button>

        <div class="flex-1 overflow-y-auto overflow-x-hidden flex flex-col">
            
            <!-- 1. CONTEXTUAL TOOLS -->
            <div id="context-tools" class="flex flex-col py-2 border-b border-aw-border hidden">
                <div class="px-4 py-2 text-[10px] text-gray-500 uppercase tracking-widest hide-collapsed font-bold">Active Intel</div>
                
                <button id="btn-ctx-system" onclick="copyToDiscord('system')" class="h-12 w-full flex items-center justify-start px-4 hover:bg-aw-border text-gray-300 hidden transition-colors">
                    <i class="fa-solid fa-crosshairs text-aw-ally text-lg w-6 text-center"></i>
                    <div class="ml-4 flex flex-col items-start sidebar-text">
                        <span class="text-[10px] text-gray-500 uppercase leading-tight">System Map</span>
                        <span id="ui-sys-id" class="font-bold text-white leading-tight">System #--</span>
                    </div>
                </button>

                <button id="btn-ctx-map" onclick="copyToDiscord('map')" class="h-12 w-full flex items-center justify-start px-4 hover:bg-aw-border text-gray-300 hidden transition-colors">
                    <i class="fa-solid fa-map text-aw-warning text-lg w-6 text-center"></i>
                    <div class="ml-4 flex flex-col items-start sidebar-text">
                        <span class="text-[10px] text-gray-500 uppercase leading-tight">Coordinates</span>
                        <span id="ui-map-coords" class="font-mono font-bold text-white leading-tight">X: -- / Y: --</span>
                    </div>
                </button>

                <button id="btn-ctx-player" onclick="copyToDiscord('player')" class="h-12 w-full flex items-center justify-start px-4 hover:bg-aw-border text-gray-300 hidden transition-colors">
                    <i class="fa-solid fa-user-astronaut text-aw-primary text-lg w-6 text-center"></i>
                    <div class="ml-4 flex flex-col items-start sidebar-text">
                        <span class="text-[10px] text-gray-500 uppercase leading-tight">Profile Data</span>
                        <span id="ui-player-name" class="font-bold text-white leading-tight">Unknown</span>
                    </div>
                </button>
            </div>

            <!-- 2. GLOBAL TOOLS -->
            <div class="flex flex-col py-2 border-b border-aw-border">
                <div class="px-4 py-2 text-[10px] text-gray-500 uppercase tracking-widest hide-collapsed font-bold">Database</div>
                
                <button onclick="alert('Player tool coming soon')" class="h-12 w-full flex items-center justify-start px-4 hover:bg-aw-border text-gray-300 transition-colors">
                    <i class="fa-solid fa-users w-6 text-center text-lg"></i>
                    <span class="ml-4 sidebar-text">Players</span>
                </button>
                <button onclick="alert('Alliance tool coming soon')" class="h-12 w-full flex items-center justify-start px-4 hover:bg-aw-border text-gray-300 transition-colors">
                    <i class="fa-solid fa-shield-halved w-6 text-center text-lg"></i>
                    <span class="ml-4 sidebar-text">Alliances</span>
                </button>
                <button onclick="alert('Fleet tool coming soon')" class="h-12 w-full flex items-center justify-start px-4 hover:bg-aw-border text-gray-300 transition-colors">
                    <i class="fa-solid fa-rocket w-6 text-center text-lg"></i>
                    <span class="ml-4 sidebar-text">Fleet Tracker</span>
                </button>
            </div>

            <!-- DB Summary Block -->
            <div class="p-4 hide-collapsed mt-auto">
                <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-2 font-bold flex justify-between items-center">
                    <span>Storage Stats</span>
                    <button onclick="refreshDbStats()" class="hover:text-white" title="Refresh Stats"><i class="fa-solid fa-rotate"></i></button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="bg-aw-bg/50 border border-aw-border rounded p-2 flex flex-col items-center">
                        <span class="text-gray-500 text-[10px]">Planets</span>
                        <span id="stat-planets" class="text-sm font-bold text-white">0</span>
                    </div>
                    <div class="bg-aw-bg/50 border border-aw-border rounded p-2 flex flex-col items-center">
                        <span class="text-gray-500 text-[10px]">Players</span>
                        <span id="stat-players" class="text-sm font-bold text-white">0</span>
                    </div>
                    <div class="bg-aw-bg/50 border border-aw-border rounded p-2 flex flex-col items-center">
                        <span class="text-gray-500 text-[10px]">Systems</span>
                        <span id="stat-systems" class="text-sm font-bold text-white">0</span>
                    </div>
                    <div class="bg-aw-bg/50 border border-aw-border rounded p-2 flex flex-col items-center">
                        <span class="text-gray-500 text-[10px]">Alliances</span>
                        <span id="stat-alliances" class="text-sm font-bold text-white">0</span>
                    </div>
                </div>
            </div>

        </div>

        <!-- Footer / Auth -->
        <div class="border-t border-aw-border flex flex-col py-2 shrink-0 bg-aw-panel">
            <button id="admin-panel-btn" onclick="window.open('/admin', '_blank')" class="hidden h-12 w-full items-center justify-start px-4 hover:bg-aw-warning/20 text-aw-warning transition-colors">
                <i class="fa-solid fa-gear w-6 text-center text-lg"></i>
                <span class="ml-4 sidebar-text">Admin Panel</span>
            </button>
            <button onclick="logout()" class="h-12 w-full flex items-center justify-start px-4 hover:bg-red-900/50 text-red-400 transition-colors">
                <i class="fa-solid fa-right-from-bracket w-6 text-center text-lg"></i>
                <div class="ml-4 flex flex-col items-start sidebar-text">
                    <span class="leading-tight">Logout</span>
                    <span id="auth-user-display" class="text-[10px] text-gray-500 font-mono">Auth: --</span>
                </div>
            </button>
        </div>
    </nav>

    <!-- Toast Notification -->
    <div id="toast" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-aw-discord text-white text-xs font-bold py-2 px-4 rounded shadow-lg flex items-center justify-center gap-2 pointer-events-none toast-enter z-50">
        <i class="fa-solid fa-circle-check"></i> <span id="toast-msg">Copied</span>
    </div>

    <!-- ========================================== -->
    <!-- SCRIPTS                                    -->
    <!-- ========================================== -->
    <script>
        let toolUser = null;

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const savedPath = urlParams.get('p') || '/';
            document.getElementById('game-frame').src = savedPath;

            const sidebar = document.getElementById('sidebar');
            const mobileBtn = document.getElementById('mobile-trigger');
            
            // Check state on load
            if (localStorage.getItem('sidebarOpen') === 'true') {
                sidebar.classList.add('expanded');
                mobileBtn.classList.add('hidden');
                refreshDbStats(); 
            } else {
                // If it's closed on load, ensure the mobile button shows up
                if (window.innerWidth < 768) mobileBtn.classList.remove('hidden');
            }
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mobileBtn = document.getElementById('mobile-trigger');
            
            sidebar.classList.toggle('expanded');
            const isOpen = sidebar.classList.contains('expanded');
            
            localStorage.setItem('sidebarOpen', isOpen);

            // Handle Mobile Trigger Button Visiblity
            if (window.innerWidth < 768) {
                if (isOpen) {
                    mobileBtn.classList.add('hidden');
                } else {
                    mobileBtn.classList.remove('hidden');
                }
            }

            if (isOpen) refreshDbStats();
        }

        async function initWrapper() {
            const res = await fetch('/hub-api/me');
            if (res.ok) {
                toolUser = await res.json();
                document.getElementById('auth-user-display').innerText = `Auth: ${toolUser.gameName}`;
                if (toolUser.role === 'admin') {
                    document.getElementById('admin-panel-btn').style.display = 'flex';
                }
            }
        }
        initWrapper();

        async function refreshDbStats() {
            try {
                const res = await fetch('/hub-api/intel/summary');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('stat-planets').innerText = data.planets;
                    document.getElementById('stat-players').innerText = data.players;
                    document.getElementById('stat-systems').innerText = data.systems;
                    document.getElementById('stat-alliances').innerText = data.alliances;
                }
            } catch (err) { console.error("Failed to load intel summary", err); }
        }

        window.addEventListener('message', async (event) => {
            if (event.origin !== window.location.origin) return;
            const data = event.data;

            if (data.type === 'GAME_CONTEXT') {
                const p = data.payload;

                if (p.path) {
                    const currentUrl = new URL(window.location);
                    if (currentUrl.searchParams.get('p') !== p.path) {
                        window.history.replaceState(null, '', `/dashboard?p=${p.path}`);
                    }
                }

                if (p.playerName && toolUser && toolUser.gameName) {
                    if (toolUser.role !== 'admin' && p.playerName.toLowerCase() !== toolUser.gameName.toLowerCase()) {
                        const response = await fetch('/hub-api/nuke', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ detectedName: p.playerName })
                        });
                        const nukeData = await response.json();
                        if (nukeData.banned) {
                            document.body.innerHTML = `<div style="color:red; font-size:24px; padding:50px; text-align:center;">
                                <h1>SECURITY BREACH DETECTED</h1><p>Banned for credential sharing.</p></div>`;
                            setTimeout(() => window.location.href = '/hub-assets/login.html', 3000);
                            return;
                        }
                    }
                }

                // --- DYNAMIC UI UPDATES ---
                const ctxContainer = document.getElementById('context-tools');
                const btnSys = document.getElementById('btn-ctx-system');
                const btnMap = document.getElementById('btn-ctx-map');
                const btnPlayer = document.getElementById('btn-ctx-player');
                
                // Reset tools
                ctxContainer.classList.add('hidden');
                btnSys.classList.add('hidden');
                btnMap.classList.add('hidden');
                btnPlayer.classList.add('hidden');

                if (p.isSystemView && p.systemId) {
                    ctxContainer.classList.remove('hidden');
                    btnSys.classList.remove('hidden');
                    document.getElementById('ui-sys-id').innerText = `System #${p.systemId}`;
                } 
                
                if (p.isMap && p.mapX && p.mapY) {
                    ctxContainer.classList.remove('hidden');
                    btnMap.classList.remove('hidden');
                    document.getElementById('ui-map-coords').innerText = `${p.mapX} / ${p.mapY}`;
                }

                // Make sure to update spy.js to pass targetPlayerName if you want to show it here
                if (p.path.includes('/Game/Players/Profile/')) {
                    ctxContainer.classList.remove('hidden');
                    btnPlayer.classList.remove('hidden');
                }
            }
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.classList.add('toast-active');
            toast.classList.remove('toast-enter');
            setTimeout(() => {
                toast.classList.remove('toast-active');
                toast.classList.add('toast-enter');
            }, 2500);
        }

        function copyToDiscord(type) {
            if (type === 'system') {
                const sysText = document.getElementById('ui-sys-id').innerText;
                navigator.clipboard.writeText(`Target: ${sysText}`);
                showToast('System Copied');
            } else if (type === 'map') {
                const coords = document.getElementById('ui-map-coords').innerText;
                navigator.clipboard.writeText(`Target Coordinates: ${coords}`);
                showToast('Coordinates Copied');
            } else if (type === 'player') {
                showToast('Feature Coming Soon');
            }
        }

        async function logout() {
            await fetch('/hub-api/logout', { method: 'POST' });
            window.location.href = '/hub-assets/login.html';
        }
    </script>
</body>
</html>
