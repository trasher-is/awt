<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alliance Hub - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        border: "hsl(240 3.7% 15.9%)", input: "hsl(240 3.7% 15.9%)", ring: "hsl(240 4.9% 83.9%)", background: "hsl(240 10% 3.9%)", foreground: "hsl(0 0% 98%)",
                        primary: { DEFAULT: "hsl(0 0% 98%)", foreground: "hsl(240 5.9% 10%)" },
                        secondary: { DEFAULT: "hsl(240 3.7% 15.9%)", foreground: "hsl(0 0% 98%)" },
                        muted: { DEFAULT: "hsl(240 3.7% 15.9%)", foreground: "hsl(240 5% 64.9%)" },
                        accent: { DEFAULT: "hsl(240 3.7% 15.9%)", foreground: "hsl(0 0% 98%)" },
                        card: { DEFAULT: "hsl(240 10% 3.9%)", foreground: "hsl(0 0% 98%)" },
                        aw: { enemy: '#ef4444', ally: '#22c55e', warning: '#f59e0b', discord: '#5865F2' }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: hsl(240 3.7% 20%); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: hsl(240 5% 64.9%); }
        .toast-enter { transform: translateY(100%); opacity: 0; } .toast-active { transform: translateY(0); opacity: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-text { transition: opacity 0.2s ease-in-out; opacity: 0; white-space: nowrap; pointer-events: none; }
        @media (min-width: 768px) { #sidebar.expanded { width: 22rem; } #sidebar.expanded .sidebar-text { opacity: 1; pointer-events: auto; } #sidebar:not(.expanded) .hide-collapsed { display: none; } }
        @media (max-width: 767px) { #sidebar { transform: translateX(-100%); width: 100%; border-right: none; } #sidebar.expanded { transform: translateX(0); } #sidebar.expanded .sidebar-text { opacity: 1; pointer-events: auto; } #mobile-trigger { display: flex; } }
        .plan-card { border-left: 3px solid hsl(var(--aw-warning)); }
    </style>
</head>
<body class="w-screen h-screen overflow-hidden bg-background text-foreground font-sans text-sm select-none" oncontextmenu="return false;">

    <main class="absolute inset-0 w-full bg-black z-0" style="height: 100dvh;">
        <iframe id="game-frame" class="w-full border-none" style="height: 100dvh;"></iframe>
    </main>

    <button id="mobile-trigger" onclick="toggleSidebar()" class="hidden absolute top-12 left-4 z-40 bg-background border border-border text-foreground w-10 h-10 rounded-md shadow-sm items-center justify-center hover:bg-accent">
        <i class="fa-solid fa-bars"></i>
    </button>

    <nav id="sidebar" class="absolute top-0 left-0 h-full w-14 md:w-14 transition-all duration-300 bg-background/95 backdrop-blur-md border-r border-border flex flex-col z-50 overflow-x-hidden shadow-2xl">
        <button onclick="toggleSidebar()" class="h-14 w-full flex items-center justify-start px-4 border-b border-border hover:bg-accent text-foreground shrink-0 transition-colors group">
            <i class="fa-solid fa-shuttle-space text-lg w-6 text-center group-hover:scale-110 transition-transform"></i>
            <span class="ml-4 font-semibold tracking-wide sidebar-text">Hub v2</span>
            <i class="fa-solid fa-xmark ml-auto md:hidden text-muted-foreground sidebar-text text-lg"></i>
        </button>

        <div class="flex-1 flex flex-col pt-2">
            
            <div id="context-tools" class="flex flex-col pb-4 border-b border-border hidden">
                <div class="px-4 py-2 text-s text-muted-foreground font-semibold uppercase tracking-wider hide-collapsed flex justify-between items-center">
                    <span>System Intel</span><span id="ui-sys-id" class="text-foreground font-mono hidden">--</span>
                </div>

                <div class="flex items-center gap-2">
                    <button onclick="openTakeoverBoardPanel()" class="text-muted-foreground hover:text-green-400 transition-colors" title="Test planner">
                        <i class="fa-solid fa-square-poll-horizontal text-base"></i>
                    </button>
                    <span id="ui-sys-id" class="text-foreground font-mono">--</span>
                </div>
            
                <div id="system-intel-container" class="px-4 py-2 hide-collapsed flex flex-col gap-4 text-sm">
                    <div>
                        <div class="text-muted-foreground font-semibold border-b border-border pb-1 mb-2">Planets</div>
                        <div id="intel-planets-list" class="flex flex-col gap-1.5"></div>
                    </div>
                    
                    <div id="system-plans-container" class="flex flex-col gap-3">
                        <div class="text-muted-foreground font-semibold border-b border-border pb-1 mb-2">Tactical Plans</div>
                        <div class="bg-card border border-border rounded-lg p-3 shadow-sm">
                            <div class="flex gap-2 mb-3">
                                <select id="plan-planet-idx" class="h-8 w-24 rounded-md border border-input bg-background px-2 py-1 text-sm shadow-sm focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring text-muted-foreground">
                                    <option value="" disabled selected>Planet #</option>
                                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                                    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                                    <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                                    <option value="10">10</option><option value="11">11</option><option value="12">12</option>
                                </select>
                                <input type="text" id="plan-note" placeholder="Instructions..." class="h-8 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring">
                                <button onclick="savePlan()" class="inline-flex items-center justify-center h-8 px-3 rounded-md bg-primary text-primary-foreground font-medium hover:bg-primary/90 text-sm shadow-sm">Save</button>
                            </div>
                        </div>
                        <div id="plans-list" class="flex flex-col gap-2 empty:hidden"></div>
                    </div>

                    <div>
                        <div class="text-aw-enemy font-semibold border-b border-border pb-1 mb-2">Fleets in Orbit</div>
                        <div id="intel-fleets-list" class="flex flex-col gap-1.5"></div>
                    </div>

                    <div>
                        <div class="text-muted-foreground font-semibold border-b border-border pb-1 mb-2">Recent History</div>
                        <div id="intel-history-list" class="flex flex-col gap-1.5"></div>
                    </div>
                </div>
                <button id="btn-ctx-map" onclick="copyToDiscord('map')" class="h-10 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground hidden transition-colors mt-2">
                    <i class="fa-solid fa-map w-6 text-center text-sm"></i>
                    <div class="ml-4 flex flex-col items-start sidebar-text">
                        <span class="text-s text-muted-foreground uppercase leading-tight">Coordinates</span>
                        <span id="ui-map-coords" class="font-mono font-medium text-foreground leading-tight">X: -- / Y: --</span>
                    </div>
                </button>
            </div>

            <div id="player-context-tools" class="flex flex-col pb-4 border-b border-border hidden">
                <div class="px-4 py-2 text-s text-muted-foreground font-semibold uppercase tracking-wider hide-collapsed flex justify-between items-center">
                    <span>Player Intel</span><span id="ui-player-id" class="text-foreground font-mono hidden">--</span>
                </div>
                <div id="player-intel-container" class="px-4 py-2 hide-collapsed flex flex-col gap-4 text-sm">
                    <div>
                        <div class="text-muted-foreground font-semibold border-b border-border pb-1 mb-2">Overview</div>
                        <div id="player-stats-list" class="flex flex-col gap-1.5 text-sm">
                            <span class="text-muted-foreground italic text-center py-2"><i class="fa-solid fa-circle-notch fa-spin"></i> Analyzing...</span>
                        </div>
                    </div>
                    <div>
                        <div class="text-muted-foreground font-semibold border-b border-border pb-1 mb-2">Activity Log</div>
                        <div class="bg-card border border-border rounded p-2 shadow-sm h-28 w-full">
                            <canvas id="playerHeatmapChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col py-4 border-b border-border hide-collapsed">
                <div class="px-4 pb-2 text-s text-muted-foreground font-semibold uppercase tracking-wider">Database Search</div>
                <div class="px-4 mb-3 relative">
                    <input type="text" id="search-player-input" placeholder="Player Name or ID..." class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring pe-8" oninput="handleSearchInput('player')">
                    <i class="fa-solid fa-magnifying-glass absolute right-7 top-2.5 text-muted-foreground text-sm pointer-events-none"></i>
                    <div id="search-player-results" class="mt-2 flex flex-col gap-1 max-h-40 overflow-y-auto empty:hidden"></div>
                </div>
                <div class="px-4 relative">
                    <input type="text" id="search-system-input" placeholder="System Name or ID..." class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring pe-8" oninput="handleSearchInput('system')">
                    <i class="fa-solid fa-magnifying-glass absolute right-7 top-2.5 text-muted-foreground text-sm pointer-events-none"></i>
                    <div id="search-system-results" class="mt-2 flex flex-col gap-1 max-h-40 overflow-y-auto empty:hidden"></div>
                </div>
            </div>

            <div class="flex flex-col py-3 border-b border-border hide-collapsed">
                <div class="px-4 pb-2 text-s text-muted-foreground font-semibold uppercase tracking-wider">Map Overlays</div>
                <div class="px-4 flex items-center justify-between">
                    <span class="text-sm text-muted-foreground">Alliance Map Vision</span>
                    <input type="checkbox" id="toggle-alliance-vision" onchange="handleAllianceVisionToggle()" class="w-4 h-4 rounded border-border bg-transparent text-primary focus:ring-0 focus:ring-offset-0 cursor-pointer">
                </div>
            </div>

            <div class="flex flex-col py-2 border-b border-border">
                <div class="px-4 py-2 text-s text-muted-foreground font-semibold uppercase tracking-wider hide-collapsed">Archives</div>
                <button onclick="openEnemyIntelPanel()" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-color">
                    <i class="fa-solid fa-bomb w-6 text-center text-sm"></i> <span class="ml-4 sidebar-text text-sm">War Room</span>
                </button>
                <button onclick="openAllianceStatsPanel()" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-colors">
                    <i class="fa-solid fa-chess w-6 text-center text-sm"></i><span class="ml-4 sidebar-text text-sm">Alliance Stats</span>
                </button>
                <button onclick="openDatabasePanel()" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-colors">
                    <i class="fa-solid fa-hand-fist w-6 text-center text-sm"></i><span class="ml-4 sidebar-text text-sm">Players</span>
                </button>
                <button onclick="openSystemDatabasePanel()" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-colors">
                    <i class="fa-solid fa-meteor w-6 text-center text-sm"></i><span class="ml-4 sidebar-text text-sm">Systems</span>
                </button>
                <button onclick="openPlanetDatabasePanel()" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-colors">
                    <i class="fa-solid fa-globe w-6 text-center text-sm"></i><span class="ml-4 sidebar-text text-sm">Planets</span>
                </button>
                <button onclick="openFleetDatabasePanel()" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-colors">
                    <i class="fa-solid fa-crow w-6 text-center text-sm"></i><span class="ml-4 sidebar-text text-sm">Fleets</span>
                </button>
                <button onclick="openOperationsTimelinePanel()" class="h-8 w-full flex items-center justify-start px-4 hover:bg-accent text-muted-foreground hover:text-foreground transition-colors">
                    <i class="fa-solid fa-timeline w-6 text-center text-sm"></i><span class="ml-4 sidebar-text text-sm">Ops Timeline</span>
                </button>
            </div>

            <div class="flex flex-col py-4 hide-collapsed mt-auto">
                <div class="px-4 pb-2 text-s text-muted-foreground font-semibold uppercase tracking-wider">Scrapers</div>
                <div class="px-4 flex flex-row gap-2">
                    <button id="btn-mass-scan" class="inline-flex items-center justify-center w-1/2 h-9 rounded-md bg-secondary text-secondary-foreground font-medium hover:bg-secondary/80 transition-colors text-sm gap-2 shadow-sm" title="Scan Galaxy"><i class="fa-solid fa-satellite-dish"></i> Galaxy</button>
                    <button id="btn-mass-scan-players" class="inline-flex items-center justify-center w-1/2 h-9 rounded-md bg-secondary text-secondary-foreground font-medium hover:bg-secondary/80 transition-colors text-sm gap-2 shadow-sm" title="Scan Players"><i class="fa-solid fa-user-astronaut"></i> Players</button>
                </div>
                <div id="scan-progress-container" class="px-4 mt-3 hidden flex-col gap-1.5">
                    <div class="flex justify-between text-s text-muted-foreground font-mono"><span id="scan-status-text">Initializing...</span><span id="scan-count-text">0/0</span></div>
                    <div class="w-full bg-secondary rounded-full h-1.5 overflow-hidden"><div id="scan-progress-bar" class="bg-primary h-1.5 rounded-full transition-all duration-200" style="width: 0%"></div></div>
                </div>
            </div>
        </div>

        <div class="border-t border-border flex flex-row shrink-0 h-12 bg-background mt-auto">
            <button id="admin-panel-btn" onclick="window.location.href='/admin'" style="display: none;" class="flex-1 items-center justify-center hover:bg-accent text-muted-foreground hover:text-foreground transition-colors border-r border-border" title="Admin Settings">
                <i class="fa-solid fa-gear text-lg"></i>
            </button>
            <button onclick="logout()" class="flex-1 flex items-center justify-center hover:bg-red-950/30 text-red-400 transition-colors" title="Logout">
                <i class="fa-solid fa-right-from-bracket text-lg"></i>
            </button>
        </div>
    </nav>

    <div id="dynamic-panels-container"></div>

    <div id="toast" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-secondary border border-border text-foreground text-s font-semibold py-2.5 px-4 rounded-md shadow-lg flex items-center gap-2 pointer-events-none toast-enter z-50">
        <i class="fa-solid fa-circle-check text-green-500"></i> <span id="toast-msg">Copied</span>
    </div>

    <script>

        async function handleAllianceVisionToggle() {
    const isChecked = document.getElementById('toggle-alliance-vision').checked;
    const iframe = document.getElementById('game-frame');
    if (!iframe || !iframe.contentWindow) return;

    if (!isChecked) {
        iframe.contentWindow.postMessage({ type: 'CLEAR_ALLIANCE_VISION' }, window.location.origin);
        return;
    }

    showToast('Assembling collective alliance vision maps...');

    try {
        // Query the correct API endpoints matching your backend registry schemas
        const [statsRes, playersRes] = await Promise.all([
            fetch('/hub-api/intel/alliance-stats'),
            fetch('/hub-api/intel/players')
        ]);
        
        const statsData = await statsRes.json();
        const playersData = await playersRes.json();

        if (statsData.success && playersData.success) {
            const memberIds = new Set();
            
            // Map member IDs directly out of the metrics payload array rows
            statsData.stats.forEach(row => {
                if (row.player_id) {
                    memberIds.add(Number(row.player_id));
                }
            });

            // Isolate matching target indices possessing valid origin systems and positive biology range parameters
            const allianceVisionData = playersData.players
                .filter(p => memberIds.has(Number(p.id)) && p.origin_system && p.biology > 0)
                .map(p => ({
                    playerId: p.id,
                    playerName: p.name,
                    originSystemId: p.origin_system,
                    range: p.biology
                }));

            iframe.contentWindow.postMessage({
                type: 'SHOW_ALLIANCE_VISION',
                payload: { visions: allianceVisionData }
            }, window.location.origin);
        } else {
            showToast('Failed to compile alliance telemetry arrays');
            document.getElementById('toggle-alliance-vision').checked = false;
        }
    } catch (err) {
        console.error("[AWT Hub] Critical vision compiler fault:", err);
        showToast('Vision mapping pipelines failed');
        document.getElementById('toggle-alliance-vision').checked = false;
    }
}

        async function handlePlayerSearchClick(playerId) {
            showToast('Calculating tactical vision grid...');
            
            const ctxContainer = document.getElementById('context-tools');
            const playerCtxContainer = document.getElementById('player-context-tools');
            const playerLabel = document.getElementById('ui-player-id');
            
            if (ctxContainer) ctxContainer.classList.add('hidden');
            if (playerCtxContainer) playerCtxContainer.classList.remove('hidden');
            if (playerLabel) {
                playerLabel.classList.remove('hidden');
                playerLabel.innerText = `#${playerId}`; // Set clean fallback number while data loads
            }

            loadPlayerIntel(playerId);
            
            try {
                const res = await fetch(`/hub-api/intel/player/${playerId}`);
                const data = await res.json();
                if (data.success && data.player) {
                    const p = data.player;
                    const range = p.biology > 0 ? p.biology : (p.science_level || 0);
                    const systems = data.systems || [];
                    const originSystemId = p.origin_system;
                    
                    const iframe = document.getElementById('game-frame');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage({
                            type: 'HIGHLIGHT_PLAYER_VISION',
                            payload: { playerId, range, systems, originSystemId }
                        }, window.location.origin);
                    }
                }
            } catch (err) {
                console.error("Failed to load map vision baseline:", err);
            }

            try {
                const response = await fetch(`/Game/Players/Profile/${playerId}`);
                if (response.ok) {
                    const html = await response.text();
                    const doc = new DOMParser().parseFromString(html, 'text/html');
                    
                    const playerParser = await import('/js/scrapers/player-parser.js');
                    const p = playerParser.extractPlayerData(playerId, doc);
                    
                    if (p.name) {
                        const syncRes = await fetch('/hub-api/sync/player', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(p)
                        });

                        if (syncRes.ok) {
                            loadPlayerIntel(playerId);
                            
                            const freshRes = await fetch(`/hub-api/intel/player/${playerId}`);
                            const freshData = await freshRes.json();
                            
                            if (freshData.success && freshData.player) {
                                const freshP = freshData.player;
                                const updatedRange = freshP.biology > 0 ? freshP.biology : (freshP.science_level || 0);
                                const iframe = document.getElementById('game-frame');
                                if (iframe && iframe.contentWindow) {
                                    iframe.contentWindow.postMessage({
                                        type: 'HIGHLIGHT_PLAYER_VISION',
                                        payload: { 
                                            playerId, 
                                            range: updatedRange, 
                                            systems: freshData.systems || [],
                                            originSystemId: freshP.origin_system
                                        }
                                    }, window.location.origin);
                                }
                            }
                        }
                    }
                }
            } catch (err) {
                console.error("Background tactical indexing failure:", err);
            }
        }

        let toolUser = null; let currentSystemId = null; 

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            document.getElementById('game-frame').src = urlParams.get('p') || '/';
            
            if (localStorage.getItem('sidebarOpen') === 'true' && window.innerWidth >= 768) {
                document.getElementById('sidebar').classList.add('expanded');
                document.getElementById('mobile-trigger').classList.add('hidden');
                refreshDbStats(); 
            } else {
                if (window.innerWidth < 768) {
                    document.getElementById('mobile-trigger').classList.remove('hidden');
                }
            }
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mobileBtn = document.getElementById('mobile-trigger');
            sidebar.classList.toggle('expanded');
            const isOpen = sidebar.classList.contains('expanded');
            localStorage.setItem('sidebarOpen', isOpen);
            if (window.innerWidth < 768) isOpen ? mobileBtn.classList.add('hidden') : mobileBtn.classList.remove('hidden');
            if (isOpen) refreshDbStats();
        }

        function toggleSystemIntelView() {
            const container = document.getElementById('system-intel-container');
            container.classList.toggle('hidden'); container.classList.toggle('flex');
        }

        async function initWrapper() {
            try {
                const res = await fetch('/hub-api/me');
                if (res.ok) {
                    toolUser = await res.json();
                    if (toolUser.role === 'admin') {
                        document.getElementById('admin-panel-btn').style.display = 'flex';
                    }
                }
            } catch (err) {
                console.error("Failed to init wrapper:", err);
            }
        }
        initWrapper();

        async function refreshDbStats() {
            try {
                const res = await fetch('/hub-api/intel/summary');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('stat-planets').innerText = data.planets;
                    document.getElementById('stat-players').innerText = data.players;
                    document.getElementById('stat-fleets').innerText = data.fleets || 0;
                    document.getElementById('stat-alliances').innerText = data.alliances;
                }
            } catch (err) {}
        }

        async function loadPlans(sysId) {
            if (!sysId) return;
            try {
                const res = await fetch(`/hub-api/intel/system/${sysId}`);
                const data = await res.json();
                if (!data.success) return;

                const list = document.getElementById('plans-list');
                list.innerHTML = '';
                if (data.plans.length > 0) {
                    data.plans.forEach(p => {
                        list.innerHTML += `<div class="bg-card border border-border p-3 rounded-lg plan-card relative group shadow-sm"><div class="flex justify-between items-start mb-1.5"><span class="text-foreground font-semibold text-s">Planet #${p.planet_index}</span><button onclick="deletePlan(${p.planet_index})" class="text-muted-foreground hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-solid fa-trash text-s"></i></button></div><p class="text-muted-foreground text-s mb-2">${p.note}</p><div class="text-s text-muted-foreground opacity-70 text-right">by ${p.author || 'Unknown'}</div></div>`;
                    });
                }
                document.getElementById('intel-planets-list').innerHTML = data.planets.map(p => `<div class="flex justify-between items-center py-0.5"><span class="text-muted-foreground">#${p.planet_index}</span><span class="font-medium">${p.owner_name ? `[${p.alliance_tag || '?'}] ${p.owner_name}` : 'Empty'}</span></div>`).join('');
                document.getElementById('intel-fleets-list').innerHTML = data.fleets.length ? data.fleets.map(f => {
                    const cv = (f.destroyers * 3) + (f.cruisers * 24) + (f.battleships * 60);
                    let statBadge = '';
                    
                    if(f.arrival_time && f.arrival_time !== '-') {
                        statBadge = `<span class="text-s bg-red-500/20 text-red-400 px-1 rounded ml-1">Transit: ${f.arrival_time}</span>`;
                    }
                    
                    return `<div class="flex justify-between items-center py-0.5 text-s">
                        <span class="text-muted-foreground">At #${f.planet_index} ${statBadge}</span>
                        <span class="text-red-400 font-medium">by [${f.alliance_tag || '?'}] ${f.owner_name || 'Unknown'} (CV: ${cv.toLocaleString()})</span>
                    </div>`;

                const sysLabel = document.getElementById('ui-sys-id');

                    btnMap.classList.add('hidden');

                    if (p.isMap && p.mapX && p.mapY) {

        async function executeSearch(type) {
            const input = document.getElementById(`search-${type}-input`);
            const resultsContainer = document.getElementById(`search-${type}-results`);
            const q = input.value.trim();
            if (!q) { 
                resultsContainer.innerHTML = ''; 
                if (type === 'player') {
                    const iframe = document.getElementById('game-frame');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage({ type: 'CLEAR_PLAYER_VISION' }, window.location.origin);
                    }
                }
                return; 
            }

            resultsContainer.innerHTML = '<div class="text-s text-muted-foreground text-center py-2"><i class="fa-solid fa-circle-notch fa-spin"></i> Searching...</div>';
            try {
                const res = await fetch(`/hub-api/search/${type}?q=${encodeURIComponent(q)}`);
                const data = await res.json();

                if (!data.success || data.results.length === 0) {
                    resultsContainer.innerHTML = '<div class="text-s text-muted-foreground text-center py-2 bg-card rounded border border-border">No records found.</div>';
                    return;
                }

                if (type === 'player') {
                    resultsContainer.innerHTML = data.results.map(p => `<button onclick="handlePlayerSearchClick(${p.id})" class="text-left w-full bg-card border border-border hover:bg-accent hover:text-accent-foreground rounded-md p-2 text-s transition-colors flex justify-between items-center group shadow-sm"><span class="truncate font-medium">${p.alliance_tag ? `<span class="text-muted-foreground font-normal">[${p.alliance_tag}]</span> ` : ''}${p.name}</span><span class="text-s text-muted-foreground font-mono">#${p.id}</span></button>`).join('');
                } else if (type === 'system') {
                    resultsContainer.innerHTML = data.results.map(s => `<button onclick="navToIframe('/Game/Map/SolarSystem/${s.id}')" class="text-left w-full bg-card border border-border hover:bg-accent hover:text-accent-foreground rounded-md p-2 text-s transition-colors flex justify-between items-center group shadow-sm"><span class="truncate font-medium">${s.name}</span><span class="text-s text-muted-foreground font-mono">#${s.id} (${s.x}/${s.y})</span></button>`).join('');
                }
            } catch (err) { resultsContainer.innerHTML = '<div class="text-s text-red-500 text-center py-2">Search failed.</div>'; }
        }

        async function refreshTakeoverBoard() {
            const body = document.getElementById('kanban-columns-container');
            body.innerHTML = '<div class="col-span-1 md:col-span-4 text-center py-12 text-muted-foreground"><i class="fa-solid fa-circle-notch fa-spin"></i> Aligning tactical grids...</div>';
            
            try {
                const [boardRes, usersRes] = await Promise.all([
                    fetch(`/hub-api/intel/takeover/${currentSystemId}`),
                    fetch('/hub-api/intel/members')
                ]);
                const boardData = await boardRes.json();
                const usersData = await usersRes.json();

                if (boardData.success && usersData.success) {
                    renderTakeoverBoard(boardData.board, usersData.members);
                }
            } catch(e) {
                body.innerHTML = '<div class="col-span-1 md:col-span-4 text-center py-12 text-red-400">Failed to pull database parameters.</div>';
            }
        }

        function renderTakeoverBoard(planets, users) {
            const columns = [
                { id: 1, title: '1. Recon / Targets', color: 'border-blue-500/50' },
                { id: 2, title: '2. Breaking Inbound', color: 'border-amber-500/50' },
                { id: 3, title: '3. Cleared / Ready', color: 'border-purple-500/50' },
                { id: 4, title: '4. Secured', color: 'border-green-500/50' }
            ];

            const colNodes = columns.map(c => `<div class="flex flex-col bg-card/40 border border-border rounded-xl p-3 h-fit min-h-[12rem] md:min-h-[80vh]"><div class="flex justify-between items-center border-b ${c.color} pb-2 mb-3"><h3 class="font-bold text-sm tracking-wide text-foreground/90">${c.title}</h3><span class="text-xs bg-secondary/80 font-semibold px-2 py-0.5 rounded-full text-muted-foreground" id="col-count-${c.id}">0</span></div><div class="flex flex-col gap-2.5" id="col-body-${c.id}"></div></div>`);
            document.getElementById('kanban-columns-container').innerHTML = colNodes.join('');

            planets.forEach(p => {
                const status = p.pipeline_status || 1;
                const bodyNode = document.getElementById(`col-body-${status}`);
                const counterNode = document.getElementById(`col-count-${status}`);
                counterNode.innerText = parseInt(counterNode.innerText, 10) + 1;

                // --- INTEGRATED LAUNCH TIME CALCULATOR ---
                let launchTimeText = '';
                if (p.target_arrival_time && p.origin_x !== null && p.target_x !== null) {
                    try {
                        const eng = p.runner_energy || 0;
                        const spd = p.runner_speed || 0;
                        const energyMod = Math.pow(0.91, eng);
                        const speedMod = 1.0 - (spd * 0.11);
                        const totalMod = energyMod * speedMod;

                        let travelSeconds = 0;
                        if (p.origin_x === p.target_x && p.origin_y === p.target_y) {
                            travelSeconds = Math.floor((14400 * totalMod) + 1200);
                        } else {
                            const dx = p.target_x - p.origin_x;
                            const dy = p.target_y - p.origin_y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            travelSeconds = Math.floor((dist * 36000 * totalMod) + 2700);
                        }

                        // Parse out chosen clock input inside local timezone specs
                        const todayStr = new Date().toISOString().split('T')[0];
                        const targetDateTime = new Date(`${todayStr}T${p.target_arrival_time}`);
                        
                        if (!isNaN(targetDateTime.getTime())) {
                            const launchDateTime = new Date(targetDateTime.getTime() - (travelSeconds * 1000));
                            launchTimeText = `
                                <div class="mt-1.5 pt-1.5 border-t border-border/40 text-[11px] text-muted-foreground flex flex-col gap-0.5">
                                    <div class="flex justify-between"><span>Travel:</span> <span class="font-mono text-foreground font-medium">${Math.floor(travelSeconds/3600)}h ${Math.floor((travelSeconds%3600)/60)}m</span></div>
                                    <div class="flex justify-between text-green-400"><span>Launch Clock:</span> <span class="font-bold">${launchDateTime.toLocaleTimeString(undefined, {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false})}</span></div>
                                </div>
                            `;
                        }
                    } catch(err) {}
                }

                const userOptions = users.map(u => `<option value="${u}" ${p.assigned_name === u ? 'selected' : ''}>${u}</option>`).join('');

                const card = `
                    <div class="bg-background border border-border hover:border-muted/80 rounded-lg p-3 shadow-sm flex flex-col gap-1.5 transition-colors relative">
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-foreground text-sm">Planet #${p.planet_index}</span>
                            <div class="flex gap-1">
                                ${status > 1 ? `<button onclick="shiftNodeColumn(${p.planet_index}, ${status - 1})" class="h-6 w-6 rounded border border-border bg-card flex items-center justify-center text-muted-foreground hover:text-foreground text-xs"><i class="fa-solid fa-chevron-left"></i></button>` : ''}
                                ${status < 4 ? `<button onclick="shiftNodeColumn(${p.planet_index}, ${status + 1})" class="h-6 w-6 rounded border border-border bg-card flex items-center justify-center text-muted-foreground hover:text-foreground text-xs"><i class="fa-solid fa-chevron-right"></i></button>` : ''}
                            </div>
                        </div>

                        <div class="text-xs text-muted-foreground flex flex-col gap-0.5">
                            <div class="truncate">Intel: <span class="text-foreground font-medium">${p.owner_name ? `[${p.alliance_tag || '?'}] ${p.owner_name}` : 'Empty Space'}</span></div>
                            <div class="flex gap-3"><span>Pop: <strong class="text-foreground">${(p.population || 0).toLocaleString()}</strong></span><span>SB: <strong class="text-foreground">${p.starbase || 0}</strong></span></div>
                        </div>

                        <div class="flex flex-col gap-1.5 mt-1">
                            <select onchange="assignNodeRunner(${p.planet_index}, this.value)" class="h-7 w-full rounded border border-input bg-card px-1.5 py-0.5 text-xs text-muted-foreground focus:outline-none">
                                <option value="__REMOVE__">-- Assign Raider --</option>
                                ${userOptions}
                            </select>

                            <div class="flex items-center gap-1.5">
                                <input type="time" step="1" value="${p.target_arrival_time || ''}" onchange="setNodeArrivalTime(${p.planet_index}, this.value)" class="h-7 flex-1 rounded border border-input bg-card px-1.5 py-0.5 text-xs text-foreground focus:outline-none font-mono">
                                ${p.target_arrival_time ? `<button onclick="setNodeArrivalTime(${p.planet_index}, '__REMOVE__')" class="h-7 w-7 rounded border border-border bg-card hover:bg-red-950/20 text-muted-foreground hover:text-red-400 flex items-center justify-center text-xs"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                            </div>
                        </div>

                        ${launchTimeText}
                    </div>
                `;
                bodyNode.innerHTML += card;
            });
        }

        async function shiftNodeColumn(planetIdx, newStatus) {
            try {
                const res = await fetch('/hub-api/intel/takeover', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ system_id: currentSystemId, planet_index: planetIdx, pipeline_status: newStatus }) });
                if (res.ok) await refreshTakeoverBoard();
            } catch(e) {}
        }

        function renderOperationsTimeline(timeline) {
            const container = document.getElementById('ops-timeline-body');
            if (!timeline || timeline.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 bg-card border border-border rounded-xl p-4 text-muted-foreground italic">
                        <i class="fa-solid fa-circle-info block text-2xl mb-2 text-muted-foreground/40"></i>
                        No active fleet operations or landing trajectories logged in system registry.
                    </div>
                `;
                return;
            }

            // 1. Group operations by Target Planet Coordinate Vectors
            const groups = {};
            timeline.forEach(op => {
                const key = `${op.system_id}_${op.planet_index}`;
                if (!groups[key]) {
                    groups[key] = {
                        system_name: op.system_name,
                        system_id: op.system_id,
                        planet_index: op.planet_index,
                        x: op.x,
                        y: op.y,
                        plan_note: op.plan_note,
                        plan_author: op.plan_author,
                        fleets: []
                    };
                }
                groups[key].fleets.push(op);
            });

            container.innerHTML = Object.values(groups).map(group => {
                
                // Helper parser to cleanly handle absolute date-times or pure clock strings for reliable time math
                const parseTimeToMs = (str) => {
                    if (!str || str === '-') return 0;
                    
                    // Attempt standard timestamp parsing first
                    let timestamp = Date.parse(str.includes('T') ? str : str.replace(' ', 'T') + 'Z');
                    if (!isNaN(timestamp)) return timestamp;

                    // Fallback: Parse standalone clock times (HH:MM:SS) to relative millisecond values
                    const timeMatch = str.match(/(\d{1,2}):(\d{2})(?::(\d{2}))/);
                    if (timeMatch) {
                        const hrs = parseInt(timeMatch[1], 10);
                        const mins = parseInt(timeMatch[2], 10);
                        const secs = parseInt(timeMatch[3] || 0, 10);
                        return ((hrs * 60 + mins) * 60 + secs) * 1000;
                    }
                    return 0;
                };

                // 2. Conflict Analysis Check: Scan for matching land vectors within 15 minutes of each other
                group.fleets.forEach((f1, i) => {
                    f1.hasOverlap = false;
                    const t1 = parseTimeToMs(f1.arrival_time);
                    if (!t1) return;

                    group.fleets.forEach((f2, j) => {
                        if (i === j) return;
                        const t2 = parseTimeToMs(f2.arrival_time);
                        if (!t2) return;

                        // 15 Minutes window checking value = 15 * 60 * 1000 ms
                        if (Math.abs(t1 - t2) <= 15 * 60 * 1000) {
                            f1.hasOverlap = true;
                        }
                    });
                });

                // 3. Generate Compacter Fleet Component Rows
                const fleetRows = group.fleets.map(f => {
                    const cv = (f.destroyers * 3) + (f.cruisers * 24) + (f.battleships * 60);
                    
                    // Format or fallback safely to prevent any variant of "Invalid Date"
                    let displayTime = f.arrival_time;
                    if (f.arrival_time.includes('-') || f.arrival_time.includes('/')) {
                        const d = new Date(f.arrival_time.includes('T') ? f.arrival_time : f.arrival_time.replace(' ', 'T') + 'Z');
                        if (!isNaN(d.getTime())) {
                            displayTime = d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
                        }
                    }

                    // Dynamically apply warning visual overrides if synchronized targets collide
                    const boxStyle = f.hasOverlap 
                        ? 'border-red-500 bg-red-950/20' 
                        : 'border-border/40 bg-background/30';
                    const etaStyle = f.hasOverlap 
                        ? 'font-bold text-red-400 text-xs' 
                        : 'text-muted-foreground text-[11px]';

                    return `
                        <div class="border ${boxStyle} rounded-md px-2 py-1 flex flex-col gap-0.5 text-xs">
                            <div class="flex justify-between items-center">
                                <span class="font-medium text-foreground truncate max-w-[15rem]">[${f.alliance_tag || '?'}] ${f.owner_name || 'Unknown'}</span>
                                <span class="${etaStyle}">ETA: ${displayTime}</span>
                            </div>
                            <div class="flex justify-between items-center text-muted-foreground text-[11px]">
                                <div class="flex gap-2">
                                    <span><strong>${f.battleships}</strong> BS</span>
                                    <span><strong>${f.cruisers}</strong> CR</span>
                                    <span><strong>${f.destroyers}</strong> DS</span>
                                    <span><strong>${f.colony_ships}</strong> CS</span>
                                    <span><strong>${f.transports}</strong> TR</span>
                                </div>
                                <span class="font-medium text-aw-warning text-[11px]">CV ${cv.toLocaleString()}</span>
                            </div>
                        </div>
                    `;
                }).join('');

                const planSection = group.plan_note ? `
                    <div class="bg-background/50 border-l-2 border-aw-warning p-2 rounded text-xs mt-1">
                        <span class="text-muted-foreground font-bold text-[10px] block uppercase tracking-wider mb-0.5">Plan (${group.plan_author}):</span>
                        <p class="text-foreground italic">${group.plan_note}</p>
                    </div>
                ` : '';

                return `
                    <div class="bg-card border border-border rounded-xl p-3 shadow-md flex flex-col gap-2">
                        <div class="flex justify-between items-center border-b border-border/40 pb-1.5">
                            <button onclick="navToIframe('/Game/Map/SolarSystem/${group.system_id}')" class="font-bold text-foreground hover:text-blue-400 text-sm transition-colors text-left">
                                ${group.system_name || 'Unknown'} #${group.planet_index} 
                                <span class="font-mono text-xs text-muted-foreground ml-1">(${group.x}/${group.y})</span>
                            </button>
                            <span class="text-[11px] text-muted-foreground bg-secondary/80 px-2 py-0.5 rounded font-medium">
                                ${group.fleets.length} ${group.fleets.length === 1 ? 'Fleet' : 'Fleets'}
                            </span>
                        </div>
                        
                        <div class="flex flex-col gap-1.5">
                            ${fleetRows}
                        </div>

                        ${planSection}
                    </div>
                `;
            }).join('');
        }

        function parseIdleStringToSeconds(idleStr) {
            if (!idleStr || idleStr === 'Unknown') return -1;
            if (/active|online/i.test(idleStr)) return 0;
            
            let secs = 0;
            const d = idleStr.match(/(\d+)\s*d/);
            const h = idleStr.match(/(\d+)\s*h/);
            const m = idleStr.match(/(\d+)\s*m/);
            const s = idleStr.match(/(\d+)\s*s/);
            
            if (!d && !h && !m && !s) return -1;
            if (d) secs += parseInt(d[1]) * 86400;
            if (h) secs += parseInt(h[1]) * 3600;
            if (m) secs += parseInt(m[1]) * 60;
            if (s) secs += parseInt(s[1]);
            return secs;
        }

        function formatRaceModifier(val, isMasked) {
            if (isMasked) return '<span class="text-zinc-600">?</span>';
            if (val === null || val === undefined) return '<span class="text-zinc-500">-</span>';
            return val > 0 ? `<span class="text-emerald-500 font-bold">+${val}</span>` : val < 0 ? `<span class="text-rose-500 font-bold">${val}</span>` : `<span class="text-zinc-400">${val}</span>`;

        async function loadWarRoomMatrixData() {
            if (!selectedAllianceId) return;
            const tbody = document.getElementById('enemy-intel-table-body');
            if (!tbody) return;
            tbody.innerHTML = `<tr><td colspan="14" class="text-center py-6 font-mono text-zinc-400"><i class="fa-solid fa-spinner fa-spin me-2 text-red-500"></i> Decrypting intelligence matrices from DB indexes...</td></tr>`;

            try {
                const res = await fetch(`/hub-api/intel/war-room/players?alliance_id=${selectedAllianceId}`);
                const data = await res.json();
                if (!data.success) throw new Error(data.error);

                warRoomData = data.players.map(p => {
                    const factories = p.total_factories || 0;
                    const pop = p.total_population || 0;
                    const eco = p.economy || 0;
                    const social = p.social || 0;

                    // Infrastructure metrics calculations (Always processed from tracked data)
                    const estimatedProd = (factories + pop) * 1.25;
                    const dailyPP = estimatedProd * 24;
                    const costFor3CV = 30 - Math.floor(eco * 0.3);
                    const cvDay = costFor3CV > 0 ? Math.floor((dailyPP / costFor3CV) * 3) : 0;
                    const maxCv = pop * (social + 3) * 10;
                    const idleSecs = parseIdleStringToSeconds(p.idle_time);

                    return {
                        ...p,
                        calculated_prod: estimatedProd,
                        cv_day: cvDay,
                        max_cv: maxCv,
                        idle_seconds: idleSecs
                    };
                });

                if (warRoomSortCol) {
                    executeSortingRoutine();
                } else {
                    renderWarRoomTable(warRoomData);
                }
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="14" class="text-center py-6 text-red-500 font-bold">API Sync Failure Exception Event: ${err.message}</td></tr>`;
            }
        }

                return;

            data.forEach(p => {

                let idleStyle = "color: #a1a1aa;"; 
                if (p.idle_seconds >= 0) {
                    const idleMins = p.idle_seconds / 60;

        function sortWarRoom(colKey, type) {
            if (warRoomSortCol === colKey) {

            }

        function executeSortingRoutine() {
            warRoomData.sort((a, b) => {
                let valA = a[warRoomSortCol];
                let valB = b[warRoomSortCol];

                if (typeof valA === 'string') {
                    valA = valA ? valA.toLowerCase() : '';
                    valB = valB ? valB.toLowerCase() : '';
                } else {
                    valA = valA === null || valA === undefined ? (warRoomSortAsc ? 99999999 : -99999999) : valA;
                    valB = valB === null || valB === undefined ? (warRoomSortAsc ? 99999999 : -99999999) : valB;
                }

                if (valA < valB) return warRoomSortAsc ? -1 : 1;
                if (valA > valB) return warRoomSortAsc ? 1 : -1;

                if (valA === valB) {
                    let secKey = warRoomSortCol === 'race_attack' ? 'physics' : warRoomSortCol === 'race_defense' ? 'mathematics' : warRoomSortCol === 'race_speed' ? 'energy' : null;
                    if (secKey) {
                        let secA = a[secKey] || -999999;
                        let secB = b[secKey] || -999999;
                        if (secA < secB) return warRoomSortAsc ? -1 : 1;
                        if (secA > secB) return warRoomSortAsc ? 1 : -1;
                    }
                }
                return 0;
            });

            renderWarRoomTable(warRoomData);
        }

        window.renderAllyStatsTable = function() {
            let filtered = [...rawDbAllyStats];

            filtered.sort((a, b) => {
                let v1 = a[allyStatsSortCol] ?? 0;

                if (['science_rate', 'culture_rate', 'production_rate', 'astro_dollars', 'production_points'].includes(allyStatsSortCol)) {

                } else if (typeof v1 === 'string') {
                    v1 = v1.toLowerCase();
                    v2 = v2.toLowerCase();
                }

                return v1 < v2 ? (allyStatsSortAsc ? -1 : 1) : (v1 > v2 ? (allyStatsSortAsc ? 1 : -1) : 0);
            });

            const formatCultureCountdown = (isoStr) => {
                if (!isoStr) return '-';
                const msLeft = new Date(isoStr) - Date.now();
                if (msLeft <= 0) return 'Ready';
                const totalSecs = Math.floor(msLeft / 1000);
                const hrs = Math.floor(totalSecs / 3600);
                const mins = Math.floor((totalSecs % 3600) / 60);
                const secs = totalSecs % 60;
                return `${hrs}h ${mins}m ${secs}s`;
            };

            const lastUpdatedLabel = document.getElementById('alliance-stats-last-updated');
            if (lastUpdatedLabel) {
                if (filtered.length === 0) {
                    lastUpdatedLabel.innerText = "Last updated: Never";
                } else {
                    const timestamps = filtered.map(s => {
                        if (!s.updated_at) return 0;
                        const standardIso = s.updated_at.replace(' ', 'T') + 'Z';
                        return new Date(standardIso).getTime();
                    }).filter(t => !isNaN(t) && t > 0);

                    if (timestamps.length > 0) {
                        const maxTime = Math.max(...timestamps);
                        const diffMins = Math.floor((Date.now() - maxTime) / 60000);
                        
                        let relativeStr = "";
                        if (diffMins < 1) {
                            relativeStr = "Just now";
                        } else {
                            const hrs = Math.floor(diffMins / 60);
                            const mins = diffMins % 60;
                            if (hrs > 0) {
                                relativeStr = `${hrs}h ${mins}m ago`;
                            } else {
                                relativeStr = `${mins}m ago`;
                            }
                        }
                        lastUpdatedLabel.innerText = `Last updated: ${relativeStr}`;
                    } else {
                        lastUpdatedLabel.innerText = "Last updated: --";

            tbody.innerHTML = filtered.map(s => `

                    <td class="p-3 text-blue-400 font-semibold">${s.science_rate || '-'}</td>
                    <td class="p-3 text-purple-400 font-semibold">${s.culture_rate || '-'}</td>
                    <td class="p-3 text-orange-400 font-semibold">${s.production_rate || '-'}</td>
                    <td class="p-3 text-emerald-400">${s.astro_dollars || '-'}</td>
                    <td class="p-3 text-slate-300">${s.production_points || '-'}</td>
                    <td class="p-3 text-pink-400 font-semibold">${s.artefact || 'None'}</td>

                    <td class="p-3 text-amber-500 font-bold">${s.economy}</td>

        window.triggerAllianceStatsUpdate = async function() {
            const btn = document.getElementById('btn-update-alliance-stats');
            const icon = document.getElementById('icon-update-alliance-stats');
            
            if (btn) btn.disabled = true;
            if (icon) icon.className = 'fa-solid fa-circle-notch fa-spin';
            
            showToast('Parsing alliance roster links...');

            try {
                const res = await fetch('/Game/Alliance');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                
                const memberLinks = Array.from(doc.querySelectorAll('a[href*="/Game/Alliance/Member/"]'));
                if (memberLinks.length === 0) {
                    showToast('No member listings discovered');
                    if (btn) btn.disabled = false;
                    if (icon) icon.className = 'fa-solid fa-rotate';
                    return;
                }

                showToast(`Updating stats for ${memberLinks.length} personnel rows...`);

                for (const link of memberLinks) {
                    try {
                        const targetUrl = link.href;
                        const idMatch = targetUrl.match(/\/Member\/(\d+)/);
                        if (!idMatch) continue;
                        const playerId = parseInt(idMatch[1], 10);

                        const mRes = await fetch(targetUrl);
                        const mHtml = await mRes.text();
                        const mDoc = new DOMParser().parseFromString(mHtml, 'text/html');
                        const tds = Array.from(mDoc.querySelectorAll('td'));

                        const profileLink = mDoc.querySelector('a[href*="/Game/Players/Profile/"]');
                        if (!profileLink) continue;
                        const name = profileLink.innerText.trim();

                        const planetTd = tds.find(td => td.innerHTML.includes('Planets<br>(Next Culture)'));
                        let planetsText = '';
                        let nextCultureSeconds = null;
                        if (planetTd && planetTd.nextElementSibling) {
                            const valTd = planetTd.nextElementSibling;
                            planetsText = valTd.innerText.split('(')[0].trim();
                            const timerSpan = valTd.querySelector('#nextCulture');
                            if (timerSpan) nextCultureSeconds = parseInt(timerSpan.getAttribute('data-value'), 10);
                        }

                        const getRate = (label) => {
                            const td = tds.find(t => t.innerText.trim() === label);
                            return (td && td.nextElementSibling) ? td.nextElementSibling.innerText.trim().split(' ')[0] : '';
                        };

                        const getSimpleVal = (label) => {
                            const td = tds.find(t => t.innerText.trim() === label);
                            return (td && td.nextElementSibling) ? td.nextElementSibling.innerText.trim() : '';
                        };

                        const getSimpleValInt = (label) => {
                            const td = tds.find(t => t.innerText.trim() === label);
                            if (td && td.nextElementSibling) {
                                const parsed = parseInt(td.nextElementSibling.innerText.trim(), 10);
                                return isNaN(parsed) ? 0 : parsed;
                            }
                            return 0;
                        };

                        const pLevelTd = tds.find(t => t.innerText.includes('Player Level') && t.querySelector('a[data-href*="PlayerLevelTable"]'));
                        const cvLimitTd = tds.find(t => t.innerText.includes('CV Limit'));

                        const payload = {
                            player_id: playerId,
                            name,
                            planets_text: planetsText,
                            next_culture_seconds: nextCultureSeconds,
                            science_rate: getRate('Science'),
                            culture_rate: getRate('Culture'),
                            production_rate: getRate('Production'),
                            astro_dollars: getSimpleVal('Astro Dollars'),
                            production_points: getSimpleVal('Production Points'),
                            artefact: getSimpleVal('Artefact'),
                            level_text: pLevelTd && pLevelTd.nextElementSibling ? pLevelTd.nextElementSibling.innerText.trim().replace(/\s+/g, ' ') : '',
                            cv_limit_text: cvLimitTd && cvLimitTd.nextElementSibling ? cvLimitTd.nextElementSibling.innerText.trim().replace(/\s+/g, ' ') : '',
                            economy: getSimpleValInt('Economy'),
                            energy: getSimpleValInt('Energy'),
                            mathematics: getSimpleValInt('Mathematics'),
                            physics: getSimpleValInt('Physics'),
                            population: getSimpleValInt('Population')
                        };

                        await fetch('/hub-api/sync/alliance-stats', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                    } catch (memberErr) {
                        console.error('[Update Error] Member parsing exception:', memberErr);
                    }
                }

                showToast('Roster data synchronization complete');
                await window.refreshAllianceStatsData();

            } catch (err) {
                console.error('[Update Failure] Main roster download error:', err);
                showToast('Sync pipeline run aborted');
            } finally {
                if (btn) btn.disabled = false;
                if (icon) icon.className = 'fa-solid fa-rotate';
            }
        };

        function closeAllianceStatsPanel() { 
            const p = document.getElementById('alliance-stats-panel'); 
            if (p) p.classList.replace('translate-x-0', 'translate-x-full'); 
        }
    </script>

        document.getElementById('btn-mass-scan').addEventListener('click', async () => { lockUI(document.getElementById('btn-mass-scan'), document.getElementById('btn-mass-scan-players')); await runMassScan(updateUI); unlockUI(document.getElementById('btn-mass-scan'), document.getElementById('btn-mass-scan-players')); });
        document.getElementById('btn-mass-scan-players').addEventListener('click', async () => { lockUI(document.getElementById('btn-mass-scan'), document.getElementById('btn-mass-scan-players')); await runPlayerScan(updateUI); unlockUI(document.getElementById('btn-mass-scan'), document.getElementById('btn-mass-scan-players')); });

        // --- NAUJA FUNKCIJA: Sujungiame su enemy-intel.html skydeliu ---
        window.triggerMassScannerExecutionLoop = async function(allianceId) {
            try {
                // 1. Ištraukiame pasirinkto aljanso žaidėjus iš tavo API
                const res = await fetch(`/hub-api/intel/war-room/players?alliance_id=${allianceId}`);
                const data = await res.json();
                
                if (!data.success || data.players.length === 0) {
                    alert("No players found in this alliance to scan.");
                    return;
                }

                // Sukuriame ID sąrašą
                const playerIds = data.players.map(p => p.id);

                // 2. Parodome sidebar progresijos UI
                container.classList.replace('hidden', 'flex');
                
                // 3. Paleidžiame skenavimą atiduodant žaidėjų IDs ir progress funkciją
                await scanPlayerList(playerIds, updateUI);

                // 4. Paslepiame progresijos UI po 2 sekundžių
                setTimeout(() => {
                    container.classList.replace('flex', 'hidden');
                    window.refreshDbStats();
                }, 2000);

            } catch (err) {
                console.error("Failed to execute target alliance scan loop:", err);
            }
        };
    </script>
</body>
</html>
